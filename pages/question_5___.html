<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>북극곰 프로젝트 - 문제 5</title>
    
    <link rel="stylesheet" href="../lib/bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../lib/Pretendard-1.3.9/web/static/pretendard.css" />
    <link rel="stylesheet" href="../css/common.css">

    <style>
        /* common.css를 보호하며 레이아웃 제어 */
        body, html { margin: 0; padding: 0; height: 100vh; background-color: #f1f5f9; font-family: 'Pretendard', sans-serif; overflow: hidden; touch-action: none; }

        main {
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            padding: 10px 15px; box-sizing: border-box; overflow-y: auto; -webkit-overflow-scrolling: touch;
            gap: 12px;
        }

        .search-result-box {
            background: white; width: 100%; max-width: 400px; border-radius: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;
            overflow: hidden; flex-shrink: 0; height: auto; display: block;
        }
        
        .result-header {
            background: #f8fafc; padding: 8px 15px; font-size: 0.75rem; 
            font-weight: 700; color: #64748b; border-bottom: 1px solid #e2e8f0;
            display: flex; justify-content: space-between;
        }
        
        .book-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; border-bottom: 1px solid #f1f5f9; height: 50px;
        }
        .book-row:last-child { border-bottom: none; }
        .book-name { font-size: 0.85rem; font-weight: 700; color: #1e293b; text-align: left; flex: 1; }
        .call-number { font-size: 0.78rem; font-weight: 500; color: #005088; font-family: monospace; }

        .inventory-box {
            background: white; border-radius: 20px; padding: 12px; display: flex; justify-content: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 400px; flex-shrink: 0;
        }
        .item-slot { width: 52px; height: 52px; opacity: 0.15; filter: grayscale(1); transition: 0.3s; }
        .item-slot.collected { opacity: 1; filter: grayscale(0); }
        .item-slot.sorting-done { visibility: hidden; }

        .polar-sprite { 
            background-image: url('../img/spritesheet.png'); 
            background-repeat: no-repeat; 
            display: inline-block; 
            background-size: 380px 207px; 
            image-rendering: -webkit-optimize-contrast;
        }

        .icon-paper   { width: 45px; height: 45px; background-position: -23px -130px; }
        .icon-plastic { width: 45px; height: 45px; background-position: -96px -130px; }
        .icon-can     { width: 45px; height: 45px; background-position: -169px -130px; }
        .icon-glass   { width: 45px; height: 45px; background-position: -240px -130px; }
        .icon-general { width: 45px; height: 45px; background-position: -313px -130px; }

        .bins-container {
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 10px;
            visibility: hidden; opacity: 0; transition: 0.6s ease; width: 100%; max-width: 380px;
        }
        .bins-container.active { visibility: visible; opacity: 1; }

        .bin-item { text-align: center; padding: 5px; border-radius: 12px; }
        .bin-item.drag-over { background: rgba(17, 202, 160, 0.1); transform: scale(1.05); }

        .bin-img {
            background-image: url('../img/spritesheet_big2.png'); 
            background-repeat: no-repeat; 
            display: inline-block; 
            background-size: 800px 437px; 
            image-rendering: -webkit-optimize-contrast;
        }
        .bin-cyan    { width: 95px; height: 120px; background-position: -50px -119px; }
        .bin-purple  { width: 95px; height: 120px; background-position: -203px -119px; }
        .bin-red     { width: 95px; height: 120px; background-position: -353px -119px; }
        .bin-green   { width: 95px; height: 120px; background-position: -509px -119px; }
        .bin-black   { width: 95px; height: 120px; background-position: -658px -119px; }

        .drag-proxy { position: fixed; pointer-events: none; z-index: 2000; transform: translate(-50%, -50%); opacity: 0.8; display: none; }
    </style>
</head>
<body>
    <header id="common-header"></header>
    <main>
        <div class="instruction" id="guide-box">📍 아래 도서 목록을 참고하여 책을 찾고, 그 안의 쓰레기를 QR 코드로 수집하세요!</div>
        
        <div class="search-result-box" id="book-list-container">
            <div class="result-header"><span>서명 (Title)</span><span>청구기호 (Call No.)</span></div>
            <div class="book-row" id="row-paper"><span class="book-name">종이학</span><span class="call-number">아동 843-208</span></div>
            <div class="book-row" id="row-plastic"><span class="book-name">플라스틱 지구</span><span class="call-number">아동 539-암57ㅍ</span></div>
            <div class="book-row" id="row-can"><span class="book-name">미래가 온다, 로봇</span><span class="call-number">아동 508-김54ㅁv.1</span></div>
            <div class="book-row" id="row-glass"><span class="book-name">피터의 안경</span><span class="call-number">아동 843 126</span></div>
            <div class="book-row" id="row-general"><span class="book-name">집안 치우기</span><span class="call-number">아동 813.8-59</span></div>
        </div>

        <div class="inventory-box" id="inventory-area">
            <div class="item-slot" id="slot-paper" data-type="paper"><span class="icon-paper polar-sprite"></span></div>
            <div class="item-slot" id="slot-plastic" data-type="plastic"><span class="icon-plastic polar-sprite"></span></div>
            <div class="item-slot" id="slot-can" data-type="can"><span class="icon-can polar-sprite"></span></div>
            <div class="item-slot" id="slot-glass" data-type="glass"><span class="icon-glass polar-sprite"></span></div>
            <div class="item-slot" id="slot-general" data-type="general"><span class="icon-general polar-sprite"></span></div>
        </div>

        <div class="bins-container" id="bins-area">
            <div class="bin-item" data-bin="paper"><div class="bin-cyan bin-img"></div></div>
            <div class="bin-item" data-bin="plastic"><div class="bin-purple bin-img"></div></div>
            <div class="bin-item" data-bin="can"><div class="bin-red bin-img"></div></div>
            <div class="bin-item" data-bin="glass"><div class="bin-green bin-img"></div></div>
            <div class="bin-item" data-bin="general"><div class="bin-black bin-img"></div></div>
        </div>
    </main>
    <div id="drag-proxy" class="drag-proxy polar-sprite"></div>
    <footer id="common-footer"></footer>

    <script src="../lib/jquery-3.6.0.min.js"></script>
    <script src="../js/common.js"></script>
    <script>
        const REQUIRED_ITEMS = ['paper', 'plastic', 'can', 'glass', 'general'];
        let sortedCount = 0;

        $(document).ready(function() {
            initializeUI(5);
            if (checkMissionAccess()) {
                processItemCollection();
                updateInventoryUI();
                initTouchDrag();
            } else {
                window.location.href = "question_4.html";
            }
        });

        function checkMissionAccess() {
            const isQ4Done = GetFridgeCookie('q4_complete') === 'Y';
            const currentIdx = GetFridgeCookie('fridge_idx');
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('item') == null && isQ4Done) {
                SetFridgeCookie('fridge_idx', '5'); return true;
            }
            return currentIdx === '5';
        }

        function processItemCollection() {
            const newItem = new URLSearchParams(window.location.search).get('item');
            if (newItem && REQUIRED_ITEMS.includes(newItem)) {
                let collected = (GetFridgeCookie("polar_items") || "").split(',').filter(x => x);
                if (!collected.includes(newItem)) {
                    collected.push(newItem);
                    SetFridgeCookie("polar_items", collected.join(','));
                }
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        function updateInventoryUI() {
            let collected = (GetFridgeCookie("polar_items") || "").split(',').filter(x => x);
            collected.forEach(item => { $(`#slot-${item}`).addClass('collected'); $(`#row-${item}`).hide(); });
            if (collected.length === REQUIRED_ITEMS.length) {
                $('#book-list-container').hide();
                $('#guide-box').html("📍 수집 완료! 이제 인벤토리에서 쓰레기를 알맞은 통으로 <b>드래그</b>해서 버려주세요.");
                $('#bins-area').addClass('active');
            }
        }

        function initTouchDrag() {
            let dragType = null;
            const $proxy = $('#drag-proxy');
            $('.item-slot').on('touchstart', function(e) {
                if (!$(this).hasClass('collected') || $(this).hasClass('sorting-done')) return;
                dragType = $(this).data('type');
                const iconClass = $(this).find('span').attr('class').split(' ').find(c => c.startsWith('icon-'));
                $proxy.attr('class', 'drag-proxy polar-sprite ' + iconClass).show();
                moveProxy(e.touches[0].pageX, e.touches[0].pageY);
            });
            $(document).on('touchmove', function(e) {
                if (!dragType) return;
                moveProxy(e.touches[0].pageX, e.touches[0].pageY);
                const target = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
                $('.bin-item').removeClass('drag-over');
                $(target).closest('.bin-item').addClass('drag-over');
            });
            $(document).on('touchend', function(e) {
                if (!dragType) return;
                const touch = e.changedTouches[0];
                const target = document.elementFromPoint(touch.clientX, touch.clientY);
                const binType = $(target).closest('.bin-item').data('bin');
                if (binType === dragType) {
                    $(`#slot-${dragType}`).addClass('sorting-done');
                    // 모든 쓰레기를 다 넣었을 때만 이벤트 실행
                    sortedCount ++ ;
                    if (sortedCount == REQUIRED_ITEMS.length) {
                        $('#inventory-area, #guide-box').fadeOut();
                        setTimeout(() => { 
                            DeleteFridgeCookie("polar_items"); 
                            showResultModal({ success: true, message: "쓰레기 버리기 성공!", pageNum: 5 }); 
                        }, 500);
                    }
                } else if (binType) { alert("알맞은 통이 아닙니다!"); }
                $proxy.hide(); $('.bin-item').removeClass('drag-over'); dragType = null;
            });
            // Y좌표 오차 수정을 위해 오프셋 제거
            function moveProxy(x, y) { $proxy.css({ left: x + 'px', top: y + 'px' }); }
        }
    </script>
</body>
</html>
