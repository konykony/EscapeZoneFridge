<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>북극곰 프로젝트 - 엔딩</title>
    
    <link rel="stylesheet" href="../lib/bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../lib/Pretendard-1.3.9/web/static/pretendard.css" />
    <link rel="stylesheet" href="../css/common.css">

    <style>
        * { box-sizing: border-box !important; }
        body, html { 
            background-color: #000; 
            height: 100%; margin: 0; padding: 0; 
            overflow: hidden; font-family: 'Pretendard', sans-serif;
        }
        
        #wrap { position: relative; width: 100%; height: 100dvh; }

        /* 전체 화면 비디오 스타일 */
        #video-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; align-items: center; justify-content: center;
        }
        
        #endingVideo {
            width: 100%; height: 100%;
            object-fit: cover; /* 모바일 화면에 바짝 밀착 */
        }

        /* 영상 하단 안내 메시지 */
        #vdo-msg {
            position: absolute; bottom: 30px; left: 0; width: 100%;
            text-align: center; color: rgba(255,255,255,0.7);
            font-size: 0.9rem; font-weight: 700; z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        /* 미션 성공 오버레이 */
        #action-area { 
            display: none; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); 
            z-index: 20; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px;
        }

        .success-msg {
            color: #fff; text-align: center; margin-bottom: 40px;
        }
        .success-msg h1 { font-size: 2.4rem; font-weight: 900; margin-bottom: 15px; color: #60a5fa; }
        .success-msg p { font-size: 1.15rem; opacity: 0.95; font-weight: 600; line-height: 1.6; }

        .btn-next { 
            background: #2563eb; color: #fff; border: none;
            width: 100%; max-width: 320px; height: 68px;
            border-radius: 20px; font-size: 1.4rem; font-weight: 900;
            box-shadow: 0 6px 0 #1e3a8a; transition: all 0.1s;
            cursor: pointer;
            touch-action: manipulation;
        }
        .btn-next:active { transform: translateY(3px); box-shadow: 0 3px 0 #1e3a8a; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-up { animation: fadeInUp 0.8s ease-out forwards; }
    </style>
</head>
<body>
    <div id="wrap">
        <div id="video-container">
            <video id="endingVideo" playsinline muted webkit-playsinline preload="auto">
                <source src="../img/ending_202605192007.mp4" type="video/mp4">
            </video>
        </div>

        <div id="vdo-msg">영상이 시작되지 않으면 화면을 터치해 주세요.</div>

        <div id="action-area">
            <div class="success-msg animate-up">
                <h1>MISSION COMPLETE!</h1>
                <p>축하합니다, 코니님!<br>북극곰에게 냉장고를 무사히 배달했습니다.</p>
            </div>
            <button class="btn-next animate-up" onclick="goNext()">나의 기록 확인하기</button>
        </div>
    </div>

    <script src="../lib/jquery-3.6.0.min.js"></script>
    <script src="../js/common.js"></script>
    <script>
        const vdo = document.getElementById('endingVideo');

        $(document).ready(() => {
            // 1. 영상 재생 시도
            const playPromise = vdo.play();

            if (playPromise !== undefined) {
                playPromise.then(() => {
                    // 자동 재생 성공
                    $('#vdo-msg').text("영상이 재생 중입니다...");
                    setTimeout(() => $('#vdo-msg').fadeOut(1000), 3000);
                }).catch(() => {
                    // 자동 재생 차단 (사파리 등)
                    $('#vdo-msg').css('color', '#60a5fa').text("화면을 터치하면 영상이 시작됩니다.");
                    $(document).one('click touchstart', () => {
                        vdo.play();
                        $('#vdo-msg').text("영상이 재생 중입니다...");
                        setTimeout(() => $('#vdo-msg').fadeOut(1000), 2000);
                    });
                });
            }

            // 2. 영상 종료 시 이벤트
            vdo.addEventListener('ended', () => {
                $('#vdo-msg').hide();
                $('#action-area').css('display', 'flex').hide().fadeIn(1200);
            });
        });

        function goNext() {
            const urlParams = new URLSearchParams(window.location.search);
            const isTestMode = urlParams.get('type') === 'test';
            
            if (isTestMode) {
                // 테스트 모드 시 파라미터 유지하며 이동
                window.location.href = 'record.html?type=test';
            } else {
                // [수정] 완료 시점 기록 및 상태 업데이트
                const endTime = new Date().getTime();
                if (typeof SetFridgeCookie === "function") {
                    SetFridgeCookie('fridge_end_time', endTime, 24);
                    SetFridgeCookie('fridge_status', 'finished', 24);
                }
                window.location.href = 'record.html';
            }
        }
    </script>
</body>
</html>
