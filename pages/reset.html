<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>북극곰 프로젝트 - 데이터 초기화</title>
    
    <link rel="stylesheet" href="../lib/bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../lib/Pretendard-1.3.9/web/static/pretendard.css" />
    <link rel="stylesheet" href="../css/common.css">

    <style>
        body, html { 
            background-color: #f1f5f9; 
            height: 100%; margin: 0; padding: 0; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .reset-card {
            width: 100%;
            max-width: 340px;
            background: white;
            padding: 40px 25px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 2px solid #e2e8f0;
            animation: fadeInUp 0.5s ease-out;
        }

        .icon-box { font-size: 3.5rem; margin-bottom: 20px; }
        
        .title { 
            font-size: 1.5rem; font-weight: 900; color: #1e293b; 
            margin-bottom: 12px; letter-spacing: -0.5px;
        }

        .description { 
            font-size: 1rem; color: #64748b; font-weight: 600; 
            line-height: 1.6; margin-bottom: 30px; word-break: keep-all;
        }

        /* 초기화 버튼 스타일 */
        .btn-execute-reset {
            width: 100%; padding: 20px; border-radius: 20px; border: none;
            background: #ef4444; color: white; font-weight: 900; 
            font-size: 1.25rem; cursor: pointer;
            box-shadow: 0 6px 0 #b91c1c; transition: all 0.1s;
            touch-action: manipulation;
        }

        .btn-execute-reset:active { 
            transform: translateY(3px); 
            box-shadow: 0 3px 0 #b91c1c; 
        }

        /* 돌아가기 링크 */
        .btn-back {
            display: inline-block; margin-top: 25px; color: #94a3b8; 
            font-size: 0.95rem; font-weight: 700; text-decoration: underline;
            cursor: pointer;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="reset-card">
        <div class="icon-box">🗑️</div>
        <h1 class="title">데이터 초기화</h1>
        <p class="description">
            지금까지의 모험 기록과<br>
            사용자 정보를 모두 지울까요?<br>
            삭제된 데이터는 복구할 수 없습니다.
        </p>

        <button class="btn-execute-reset" onclick="triggerReset()">기록 모두 지우기</button>
        
        <div class="btn-back" onclick="history.back()">아니요, 돌아갈래요</div>
    </div>

    <script src="../lib/jquery-3.6.0.min.js"></script>
    <script src="../js/common.js"></script>
    
    <script>
        /**
         * 버튼 클릭 시 실행되는 함수
         */
        function triggerReset() {
            // common.js에 이미 구현해두신 resetAndMain() 함수 호출
            if (typeof resetAndMain === "function") {
                resetAndMain();
            } else {
                alert("초기화 함수를 찾을 수 없습니다. common.js 파일을 확인해 주세요.");
            }
        }
    </script>
</body>
</html>
