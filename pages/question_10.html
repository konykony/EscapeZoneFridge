<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>북극곰 프로젝트 - 문제 10</title>
    
    <link rel="stylesheet" href="../lib/bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../lib/Pretendard-1.3.9/web/static/pretendard.css" />
    <link rel="stylesheet" href="../css/common.css">

    <style>
        :root { --p-blue: #0ea5e9; }
        body, html { background-color: #f1f5f9; margin: 0; padding: 0; overflow-x: hidden; user-select:none; }
        
        main { 
            height: calc(100dvh - var(--header-height, 85px) - var(--footer-height, 70px)); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 10px 20px; gap: 10px; box-sizing: border-box;
            overflow-y: auto; -webkit-overflow-scrolling: touch; 
        }

        .penalty-banner {
            width: 100%; max-width: 420px; background: rgba(244, 63, 94, 0.1); 
            border: 1px solid rgba(244, 63, 94, 0.3); padding: 8px; border-radius: 12px;
            text-align: center; font-size: 0.85rem; font-weight: 800; color: #e11d48;
            flex-shrink: 0;
        }

        .instruction {
            width: 100%; max-width: 420px; background: #ffffff; 
            border: 2px solid #3b82f6; border-radius: 18px; 
            padding: 10px 15px; text-align: center;
            font-weight: 700; color: #1e40af; font-size: 0.95rem; line-height: 1.4;
            flex-shrink: 0;
        }

        .preview-card {
            width: 100%; max-width: 380px; height: 230px; 
            background: #ffffff; border-radius: 30px;
            position: relative; border: 2px solid #e2e8f0; overflow: hidden; flex-shrink: 0;
        }

        /* 1. 타이머 영역을 별도 위치로 고정 (깃발과 겹치지 않음) */
        .timer-box {
            position: absolute; top: 15px; left: 0; width: 100%;
            text-align: center; font-weight: 900; font-size: 1.1rem; z-index: 50;
            color: #ef4444; background: rgba(255,255,255,0.8);
        }

        #game-overlay { position: absolute; inset: 0; background: #ffffff; z-index: 10; display: flex; align-items: center; justify-content: center; }
        
        /* 2. 깃발 위치를 하단으로 살짝 이동 */
        .flag-unit { 
            position: absolute; width: 110px; height: 140px; 
            top: 65%; left: 50%; transform: translate(-50%, -50%);
            opacity: 0; transition: opacity 0.3s;
        }
        
        .part { transition: all 0.2s; background: transparent; border: 1.5px solid #94a3b8; box-sizing: border-box; }
        .finial-draw { position: absolute; left: 0; top: -8px; width: 22px; height: 22px; border-radius: 50%; z-index: 50; }
        .pole-draw { position: absolute; left: 6px; bottom: 0; width: 10px; height: 100%; border-radius: 5px; z-index: 30; }
        .canvas-draw { position: absolute; left: 16px; top: 12px; width: 90px; height: 60px; z-index: 30; }
        .star-draw { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 34px; height: 34px; z-index: 60; display: none; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }

        .btn-game { padding: 14px 40px; border-radius: 50px; border: none; background: var(--p-blue); color: white; font-weight: 900; font-size: 1.1rem; }
        
        .category-group { display: none; }
        .category-group.active { display: block; }
        .option-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 5px; }
        .opt-card { background: white; border-radius: 12px; padding: 10px 5px; text-align: center; border: 2px solid transparent; box-shadow: 0 3px 8px rgba(0,0,0,0.04); cursor: pointer; }
        .color-chip { width: 32px; height: 32px; margin: 0 auto 6px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.05); }
        .label { font-size: 0.8rem; font-weight: 800; }
    </style>
</head>
<body>
    <header id="common-header"></header>
    <main>
        <div class="penalty-banner">⚠️ 틀리면 기록에 3분이 추가됩니다!</div>
        <div class="instruction">
            나무심기 부스를 찾으려면 이 <b>깃발 순서</b>를 기억하고 똑같이 맞춰보세요!
        </div>

        <div class="preview-card">
            <div id="timer-display" class="timer-box" style="display:none;"></div>
            <div id="game-overlay"><button class="btn-game" id="main-btn" onclick="startSequence()">깃발 확인하기</button></div>
            <div class="flag-unit" id="f-unit">
                <div class="part finial-draw" id="d-finial"></div>
                <div class="part pole-draw" id="d-pole"></div>
                <div class="part canvas-draw" id="d-canvas"><div class="part star-draw" id="d-star"></div></div>
            </div>
        </div>

        <div class="control-section" style="width:100%; max-width:450px;">
            <div id="assembly-zone" style="display: none;">
                <div class="category-group active" id="st-1"><p style="font-weight:800; margin-bottom:10px;">1. 깃봉 색깔은?</p><div class="option-grid" id="opt-1"></div></div>
                <div class="category-group" id="st-2"><p style="font-weight:800; margin-bottom:10px;">2. 깃대 색깔은?</p><div class="option-grid" id="opt-2"></div></div>
                <div class="category-group" id="st-3"><p style="font-weight:800; margin-bottom:10px;">3. 깃발 배경 색깔은?</p><div class="option-grid" id="opt-3"></div></div>
                <div class="category-group" id="st-4"><p style="font-weight:800; margin-bottom:10px;">4. 별 색깔은?</p><div class="option-grid" id="opt-4"></div></div>
            </div>
        </div>
    </main>
    <footer id="common-footer"></footer>

    <script src="../lib/jquery-3.6.0.min.js"></script>
    <script src="../js/common.js"></script>
    <script>
        window.hints = ["위에서부터 아래로 색깔을 외우세요.", "실패 시 3분 페널티가 있습니다!", "다시 시작할 때마다 깃발 색깔은 계속 바뀝니다."];
        const PAGE_NUM = 10;
        let obsTime = parseInt(localStorage.getItem('f_time')) || 1; 
        let curStep = 1, ans = {}, user = {};
        const COLORS = { red: { hex: '#ef4444', label: '빨강' }, orange: { hex: '#f97316', label: '주황' }, yellow: { hex: '#facc15', label: '노랑' }, green: { hex: '#22c55e', label: '초록' }, blue: { hex: '#3b82f6', label: '파랑' }, purple: { hex: '#a855f7', label: '보라' } };
        const steps = ['finial', 'pole', 'color', 'star'];

        $(document).ready(() => { if (typeof initializeUI === "function") initializeUI(PAGE_NUM); });

        function startSequence() {
            $('#main-btn').hide();
            $('#f-unit').css('opacity', 0);
            let n = 3; 
            const timer = setInterval(() => { 
                $('#game-overlay').html(`<h1 style="font-weight:900; font-size:3rem;">${n}</h1>`);
                n--; if(n < 0) { clearInterval(timer); showPreview(); } 
            }, 1000);
        }

        function showPreview() {
            const colorKeys = Object.keys(COLORS).sort(() => Math.random() - 0.5);
            steps.forEach((s, i) => ans[s] = colorKeys[i]);
            renderRandomOptions();
            $('.part').css({'background-color':'transparent', 'border':'1.5px solid #94a3b8'});
            drawFlag(ans); 
            $('#game-overlay').hide(); $('#f-unit').css('opacity', 1);
            
            // 타이머 표시 영역 활성화
            $('#timer-display').show().text(`남은 시간: ${obsTime}초`);
            let timeLeft = obsTime;
            const previewTimer = setInterval(() => { 
                timeLeft--; 
                if(timeLeft > 0) $('#timer-display').text(`남은 시간: ${timeLeft}초`);
                else { clearInterval(previewTimer); $('#timer-display').hide(); startAssembly(); } 
            }, 1000);
        }

        function renderRandomOptions() {
            steps.forEach((step, idx) => {
                const target = $(`#opt-${idx + 1}`).empty();
                const correctColor = ans[step];
                const others = Object.keys(COLORS).filter(k => k !== correctColor).sort(() => Math.random() - 0.5).slice(0, 2);
                const finalThree = [correctColor, ...others].sort(() => Math.random() - 0.5);
                finalThree.forEach(key => {
                    const item = COLORS[key];
                    target.append(`<div class="opt-card" onclick="pick('${step}', '${key}')"><div class="color-chip" style="background:${item.hex}"></div><div class="label">${item.label}</div></div>`);
                });
            });
        }

        function startAssembly() {
            user = { finial:null, pole:null, color:null, star:null };
            $('#game-overlay').hide();
            $('.part').css({'background-color':'transparent', 'border':'1.5px solid #cbd5e1'});
            $('#assembly-zone').fadeIn(300); guide();
        }

        function pick(type, val) {
            user[type] = val; 
            const target = (type === 'color') ? '#d-canvas' : (type === 'finial' ? '#d-finial' : (type === 'pole' ? '#d-pole' : '#d-star'));
            $(target).css({'background-color': COLORS[val].hex, 'border':'none'});
            $(`#st-${curStep}`).hide(); curStep++;
            if (curStep <= 4) { $(`#st-${curStep}`).addClass('active').show(); guide(); }
            else { verify(); }
        }

        function guide() {
            $('.part').removeClass('highlight'); 
            if (curStep === 1) $('#d-finial').addClass('highlight');
            else if (curStep === 2) $('#d-pole').addClass('highlight');
            else if (curStep === 3) $('#d-canvas').addClass('highlight');
            else if (curStep === 4) $('#d-star').show().addClass('highlight');
        }

        function drawFlag(d) {
            if(d.finial) $('#d-finial').css({'background-color': COLORS[d.finial].hex, 'border':'none'});
            if(d.pole) $('#d-pole').css({'background-color': COLORS[d.pole].hex, 'border':'none'});
            if(d.color) $('#d-canvas').css({'background-color': COLORS[d.color].hex, 'border':'none'});
            if(d.star) $('#d-star').show().css({'background-color': COLORS[d.star].hex, 'border':'none'});
        }

        function verify() {
            const isOk = steps.every(s => ans[s] === user[s]);
            if(isOk) {
                localStorage.removeItem('f_time');
                showResultModal({ success: true, message: "축하합니다! 부스를 찾았습니다.", pageNum: PAGE_NUM });
            } else {
                if (typeof ApplyTimePenalty === "function") ApplyTimePenalty(180000); 
                obsTime++; localStorage.setItem('f_time', obsTime);
                $('#assembly-zone').hide(); $('#game-overlay').show();
                $('#game-overlay').html('<div style="color:#e11d48; font-weight:900;">깃발이 틀렸습니다!<br>기록에 3분이 추가됩니다.</div>').show();
                setTimeout(() => { location.reload(); }, 2000);
            }
        }
    </script>
</body>
</html>
