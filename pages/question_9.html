<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>북극곰 프로젝트 - 문제 9</title>
    
    <link rel="stylesheet" href="../lib/bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../lib/Pretendard-1.3.9/web/static/pretendard.css" />
    <link rel="stylesheet" href="../css/common.css">

    <style>
        /* 1. 전체 레이아웃 설정 */
        body, html { 
            overflow: hidden; 
            background-color: #f8fafc; 
            margin: 0; padding: 0; 
        }
        
        main {
            height: calc(100vh - var(--header-height) - var(--footer-height));
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            /* space-between 대신 center로 모으고 gap으로 간격 조절 */
            justify-content: center; 
            gap: 8px; 
            padding: 10px; 
            box-sizing: border-box;
        }

        .instruction {
            font-size: 1rem; 
            font-weight: 800; 
            color: #1e293b; 
            text-align: center;
            line-height: 1.3;
            margin: 0;
        }

        .status-container {
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px;
        }

        .difficulty-badge, .timer-badge {
            padding: 4px 12px; 
            border-radius: 10px;
            font-weight: 800;
            font-size: 0.9rem;
        }

        .difficulty-badge { background: white; border: 2px solid #e2e8f0; }
        .timer-badge { background: #e0f2fe; color: #0ea5e9; border: 2px solid #bae6fd; }

        /* 도로 영역: 화면 높이에 따라 유동적으로 조절하여 버튼 밀림 방지 */
        .road-container {
            position: relative; 
            width: 100%; 
            max-width: 360px; 
            height: 38vh; /* 화면 높이의 38%만 차지하도록 고정 */
            background: #cbd5e1; 
            border-radius: 30px; 
            border: 5px solid white;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .road-moving-bg {
            position: absolute; width: 100%; height: 200%; top: -100%;
            background: repeating-linear-gradient(
                #94a3b8, #94a3b8 48%, 
                #f8fafc 50%, 
                #94a3b8 52%, #94a3b8 100%
            );
            background-size: 100% 100px;
        }
        .road-moving-bg.active { animation: road-flow 0.5s linear infinite; }
        @keyframes road-flow { from { transform: translateY(0); } to { transform: translateY(100px); } }

        /* 핸들 크기를 도로 높이에 맞춰 살짝 축소 */
        .bike-handlebar {
            position: absolute; bottom: -5px; left: 50%; width: 220px;
            margin-left: -110px; z-index: 5; transition: transform 0.08s linear;
        }

        /* 하단 버튼 영역 */
        .control-group {
            display: flex; 
            gap: 12px; 
            width: 100%; 
            max-width: 360px;
            margin-top: 5px;
        }

        .btn-move {
            flex: 1; 
            padding: 18px 0; /* 터치하기 적당한 높이 유지 */
            border-radius: 20px; 
            border: none;
            background: white; 
            color: #1e293b; 
            font-size: 1.5rem; 
            font-weight: 900;
            box-shadow: 0 5px 0 #e2e8f0;
        }
        .btn-move:active { transform: translateY(3px); box-shadow: 0 2px 0 #e2e8f0; }

        /* 시작 오버레이 버튼 크기 조정 */
        .btn-start-game {
            padding: 10px 25px; font-size: 1.2rem; font-weight: 900;
            background: #0ea5e9; color: white; border: none; border-radius: 50px;
        }
    </style>
</head>
<body>
    <header id="common-header"></header>

    <main>
        <div class="instruction">
            자전거를 타고 국사봉 생태놀이터로 이동합니다.
        </div>

        <div class="status-container">
            <div class="difficulty-badge">
                <span class="lv-label">난이도</span>
                <span class="lv-number" id="lv-display">LV.5</span>
            </div>
            <div class="timer-badge" id="timer">15s</div>
        </div>

        <div class="road-container" id="camera-view">
            <div class="start-overlay" id="start-overlay">
                <button class="btn-start-game" onclick="startGame()">게임 시작</button>
            </div>
            <div class="road-moving-bg" id="road-bg"></div>
            <div class="balance-gauge"><div class="gauge-pointer" id="pointer"></div></div>
            <div class="bike-handlebar" id="handlebar">
                <svg viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10,50 Q20,30 50,30 L150,30 Q180,30 190,50" stroke="#334155" stroke-width="12" fill="none" stroke-linecap="round"/>
                    <rect x="5" y="45" width="30" height="14" rx="4" fill="#1e293b" transform="rotate(-15, 20, 52)"/>
                    <rect x="165" y="45" width="30" height="14" rx="4" fill="#1e293b" transform="rotate(15, 180, 52)"/>
                    <rect x="85" y="20" width="30" height="25" rx="3" fill="#1e293b"/>
                </svg>
            </div>
        </div>

        <div class="control-group">
            <button class="btn-move" onclick="pushBalance(-5)">◀</button>
            <button class="btn-move" onclick="pushBalance(5)">▶</button>
        </div>
    </main>

    <footer id="common-footer"></footer>

    <script src="../lib/jquery-3.6.0.min.js"></script>
    <script src="../js/common.js"></script>
    <script>
        window.hints = [
            "왼쪽 오른쪽 버튼을 눌러 자전거 균형을 맞춰 보세요",
            "빨간색 세로줄이 가운데에 있게 해보세요",
            "15초 동안 빨간색 세로줄이 가운데 있으면 성공"
        ];

        const PAGE_NUM = 9;
        let tilt, time, isRunning; // [수정] startTime 중복 선언 제거
        let gameLoop, timerLoop;
        let failCount = 0; 

        $(document).ready(function() {
            // initializeUI 내부에서 힌트 전용 변수(예: hintBaseTime) 초기화가 일어납니다.
            initializeUI(PAGE_NUM);
            initGame();
        });

        function updateDifficultyUI() {
            // LV.5(가장 어려움) ~ LV.1(가장 쉬움)
            const level = Math.max(5 - failCount, 1); 
            const display = $('#lv-display');
            display.text(`LV.${level}`);
            
            if (level >= 5) display.css('color', '#ef4444');
            else if (level >= 3) display.css('color', '#f59e0b');
            else display.css('color', '#10b981');
        }

        function initGame() {
            tilt = 0;
            time = 15;
            isRunning = false;
            updateDifficultyUI();
            $('#timer').text('15s');
            $('#start-overlay').show();
            $('#road-bg').removeClass('active');
            $('#handlebar').css('transform', `rotate(0deg)`);
            $('#camera-view').css('transform', `rotate(0deg)`);
            $('#pointer').css('left', `50%`);
            if(gameLoop) clearInterval(gameLoop);
            if(timerLoop) clearInterval(timerLoop);
        }

        function startGame() {
            isRunning = true;
            $('#start-overlay').fadeOut();
            $('#road-bg').addClass('active');

            const difficultyLevel = Math.min(failCount, 4); 
            const gravityFactor = [0.07, 0.06, 0.05, 0.03, 0.01][difficultyLevel];
            const shakeFactor = [1.5, 1.1, 0.8, 0.5, 0.3][difficultyLevel];

            gameLoop = setInterval(() => {
                if(!isRunning) return;
                let gravity = tilt * gravityFactor; 
                let randomShake = (Math.random() - 0.5) * shakeFactor; 
                tilt += (gravity + randomShake);
                $('#handlebar').css('transform', `rotate(${tilt}deg)`);
                $('#camera-view').css('transform', `rotate(${-tilt * 0.12}deg)`); 
                $('#pointer').css('left', `${50 + (tilt * 0.9)}%`);
                if (Math.abs(tilt) > 52) endGame(false);
            }, 40);

            timerLoop = setInterval(() => {
                if(!isRunning) return;
                time--;
                $('#timer').text(time + 's');
                if(time <= 0) endGame(true);
            }, 1000);
        }

        function pushBalance(val) {
            if(!isRunning) return;
            const pushPower = val * (1 + (Math.min(failCount, 4) * 0.05));
            tilt += pushPower;
        }

        function endGame(success) {
            isRunning = false;
            clearInterval(gameLoop);
            clearInterval(timerLoop);
            $('#road-bg').removeClass('active');
            if (!success) failCount++;

            showResultModal({
                success: success,
                message: success 
                    ? "무사히 도착했습니다! 대단한 균형 감각이에요." 
                    : "어이쿠! 균형을 잃고 말았습니다. 다시 도전하면 자전거가 조금 더 안정될 거예요!",
                onRetry: () => { initGame(); },
                pageNum: PAGE_NUM
            });
        }
    </script>
</body>
</html>
