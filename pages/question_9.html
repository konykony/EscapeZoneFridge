<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>북극곰 프로젝트 - 문제 9</title>
    
    <link rel="stylesheet" href="../lib/bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../lib/Pretendard-1.3.9/web/static/pretendard.css" />
    <link rel="stylesheet" href="../css/common.css">

    <style>
        body, html { 
            overflow-y: auto; 
            overflow-x: hidden;
            background-color: #f8fafc; 
            margin: 0; padding: 0; 
            height: 100%; 
        }
        
        main {
            min-height: calc(100vh - var(--header-height) - var(--footer-height));
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            gap: 15px; 
            padding: 20px; 
            box-sizing: border-box;
            padding-bottom: 40px; 
        }

        .instruction {
            font-size: 1.05rem; font-weight: 800; color: #1e293b; text-align: center;
            line-height: 1.4; margin-top: 5px;
        }

        .status-container {
            display: flex; align-items: center; justify-content: center; 
            gap: 10px; margin-bottom: 5px;
        }

        .difficulty-badge, .timer-badge {
            padding: 6px 16px; border-radius: 12px; font-weight: 800; font-size: 0.95rem;
        }
        .difficulty-badge { background: white; border: 2px solid #e2e8f0; }
        .timer-badge { background: #e0f2fe; color: #0ea5e9; border: 2px solid #bae6fd; }

        .road-container {
            position: relative; width: 100%; max-width: 400px; height: 330px; 
            background: #94a3b8; border-radius: 40px; border: 6px solid white;
            overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 1;
        }

        .road-moving-bg {
            position: absolute; width: 100%; height: 300%; top: -200%;
            background: repeating-linear-gradient(transparent, transparent 58px, rgba(255, 255, 255, 0.4) 60px, transparent 62px, transparent 120px);
            background-size: 100% 120px; z-index: 1;
        }
        .road-moving-bg.active { animation: road-flow 0.8s linear infinite; }
        @keyframes road-flow { from { transform: translateY(0); } to { transform: translateY(120px); } }

        .balance-gauge { position: absolute; top: 25px; width: 70%; left: 15%; height: 8px; background: rgba(255, 255, 255, 0.3); border-radius: 10px; z-index: 10; }
        .gauge-pointer { position: absolute; left: 50%; width: 4px; height: 18px; top: -5px; background: #ef4444; border-radius: 2px; transform: translateX(-50%); box-shadow: 0 0 5px rgba(239, 68, 68, 0.5); z-index: 11; }

        .start-overlay { position: absolute; inset: 0; background: rgba(30, 41, 59, 0.85); z-index: 100; display: flex; align-items: center; justify-content: center; border-radius: 34px; padding: 20px; text-align: center; }
        .overlay-content { color: white; }
        .overlay-desc { font-size: 0.85rem; margin-bottom: 15px; line-height: 1.5; color: #e2e8f0; }
        .penalty-highlight { color: #fda4af; font-weight: 800; text-decoration: underline; }

        .btn-start-game { padding: 15px 40px; font-size: 1.3rem; font-weight: 900; background: #0ea5e9; color: white; border: none; border-radius: 50px; cursor: pointer; }

        .bike-handlebar { position: absolute; bottom: -10px; left: 50%; width: 240px; margin-left: -120px; z-index: 5; transition: transform 0.08s linear; }

        /* [수정] 컨트롤 버튼 디자인: 그림자 제거 및 테두리 추가 */
        .control-group { display: flex; gap: 15px; width: 100%; max-width: 400px; margin-top: 10px; }
        .btn-move { 
            flex: 1; padding: 22px 0; border-radius: 22px; 
            background: white; color: #1e293b; font-size: 1.8rem; font-weight: 900;
            border: 2px solid #e2e8f0; /* 테두리 추가 */
            box-shadow: none; /* 그림자 제거 */
            transition: all 0.1s;
        }
        .btn-move:active { background-color: #f1f5f9; border-color: #cbd5e1; }

        @media (max-height: 700px) { .road-container { height: 280px; } }
    </style>
</head>
<body>
    <header id="common-header"></header>

    <main>
        <div class="instruction">자전거를 타고 국사봉 생태놀이터로 이동합니다.</div>

        <div class="status-container">
            <div class="difficulty-badge"><span class="lv-label">난이도</span> <span class="lv-number" id="lv-display">LV.5</span></div>
            <div class="timer-badge" id="timer">15s</div>
        </div>

        <div class="road-container" id="camera-view">
            <div class="start-overlay" id="start-overlay">
                <div class="overlay-content">
                    <p class="overlay-desc" id="overlay-msg">자전거 균형을 잘 맞춰보세요!<br><span class="penalty-highlight">실패하면 전체 기록에 3분이 추가됩니다.</span></p>
                    <button class="btn-start-game" onclick="startGame()">미션 시작</button>
                </div>
            </div>
            <div class="road-moving-bg" id="road-bg"></div>
            <div class="balance-gauge"><div class="gauge-pointer" id="pointer"></div></div>
            <div class="bike-handlebar" id="handlebar">
                <svg viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10,50 Q20,30 50,30 L150,30 Q180,30 190,50" stroke="#334155" stroke-width="12" fill="none" stroke-linecap="round"/>
                    <rect x="5" y="45" width="30" height="14" rx="4" fill="#1e293b" transform="rotate(-15, 20, 52)"/>
                    <rect x="165" y="45" width="30" height="14" rx="4" fill="#1e293b" transform="rotate(15, 180, 52)"/>
                    <rect x="85" y="20" width="30" height="25" rx="3" fill="#1e293b"/>
                </svg>
            </div>
        </div>

        <div class="control-group">
            <button class="btn-move" onclick="pushBalance(-5)">◀</button>
            <button class="btn-move" onclick="pushBalance(5)">▶</button>
        </div>
    </main>

    <footer id="common-footer"></footer>

    <script src="../lib/jquery-3.6.0.min.js"></script>
    <script src="../js/common.js"></script>
    <script>
        // JS 로직 (이전과 동일)...
        window.hints = [
            "버튼을 눌러 빨간색 세로줄이 가운데 오게 하세요.",
            "실패 시 시작 시간이 3분 전으로 되돌아갑니다.",
            "난이도가 낮아지면 핸들이 흔들리는 힘이 줄어듭니다."
        ];

        const PAGE_NUM = 9;
        let tilt, time, isRunning;
        let gameLoop, timerLoop;
        let failCount = 0; 

        $(document).ready(function() {
            initializeUI(PAGE_NUM);
            initGame();
        });

        function updateDifficultyUI() {
            const level = Math.max(5 - failCount, 1); 
            const display = $('#lv-display');
            display.text(`LV.${level}`);
            if (level >= 5) display.css('color', '#ef4444');
            else if (level >= 3) display.css('color', '#f59e0b');
            else display.css('color', '#10b981');
        }

        function initGame() {
            tilt = 0; time = 15; isRunning = false;
            updateDifficultyUI();
            $('#timer').text('15s');
            $('#start-overlay').show();
            $('#road-bg').removeClass('active');
            $('#handlebar').css('transform', `rotate(0deg)`);
            $('#camera-view').css('transform', `rotate(0deg)`);
            $('#pointer').css('left', `50%`);
            if(gameLoop) clearInterval(gameLoop);
            if(timerLoop) clearInterval(timerLoop);
        }

        function startGame() {
            isRunning = true;
            $('#start-overlay').fadeOut();
            $('#road-bg').addClass('active');

            const difficultyLevel = Math.min(failCount, 4); 
            const gravityFactor = [0.07, 0.06, 0.05, 0.03, 0.01][difficultyLevel];
            const shakeFactor = [1.5, 1.1, 0.8, 0.5, 0.3][difficultyLevel];

            gameLoop = setInterval(() => {
                if(!isRunning) return;
                let gravity = tilt * gravityFactor; 
                let randomShake = (Math.random() - 0.5) * shakeFactor; 
                tilt += (gravity + randomShake);
                $('#handlebar').css('transform', `rotate(${tilt}deg)`);
                $('#camera-view').css('transform', `rotate(${-tilt * 0.12}deg)`); 
                $('#pointer').css('left', `${50 + (tilt * 0.9)}%`);
                if (Math.abs(tilt) > 52) endGame(false);
            }, 40);

            timerLoop = setInterval(() => {
                if(!isRunning) return;
                time--;
                $('#timer').text(time + 's');
                if(time <= 0) endGame(true);
            }, 1000);
        }

        function pushBalance(val) {
            if(!isRunning) return;
            tilt += val;
        }

        function endGame(success) {
            isRunning = false;
            clearInterval(gameLoop);
            clearInterval(timerLoop);
            $('#road-bg').removeClass('active');

            if (!success) {
                failCount++;
                ApplyTimePenalty(180000); // 공통 함수 사용
                $('#overlay-msg').html(`균형을 잃었습니다! <span class="penalty-highlight">기록에 3분이 추가되었습니다.</span><br>난이도가 LV.${Math.max(5-failCount, 1)}로 조정됩니다.`);
            }

            showResultModal({
                success: success,
                message: success 
                    ? "무사히 도착했습니다! 대단한 균형 감각이에요." 
                    : "어이쿠! 균형을 잃고 말았습니다. 다시 도전하면 자전거가 조금 더 안정될 거예요!",
                onRetry: () => { initGame(); },
                pageNum: PAGE_NUM
            });
        }
    </script>
</body>
</html>
