    <style>
        body, html { overflow: hidden; background-color: #f8fafc; }
        
        main {
            height: calc(100vh - var(--header-height) - var(--footer-height));
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 20px; position: relative;
        }

        .instruction {
            font-size: 1.1rem; font-weight: 800; color: #1e293b; text-align: center;
            line-height: 1.6; z-index: 10;
        }

        .road-container {
            position: relative; width: 100%; max-width: 400px; height: 380px;
            background: #cbd5e1; border-radius: 40px; border: 6px solid white;
            overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            transition: transform 0.15s ease-out;
        }

        .road-moving-bg {
            position: absolute; width: 100%; height: 200%; top: -100%;
            background: repeating-linear-gradient(
                #94a3b8, #94a3b8 48%, 
                #f8fafc 50%, 
                #94a3b8 52%, #94a3b8 100%
            );
            background-size: 100% 120px;
        }
        
        .road-moving-bg.active {
            animation: road-flow 0.5s linear infinite;
        }
        @keyframes road-flow { from { transform: translateY(0); } to { transform: translateY(120px); } }

        /* 시작 오버레이 */
        .start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(30, 41, 59, 0.7); z-index: 100;
            display: flex; align-items: center; justify-content: center;
            border-radius: 34px;
        }
        .btn-start-game {
            padding: 15px 40px; font-size: 1.5rem; font-weight: 900;
            background: #0ea5e9; color: white; border: none; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4); transition: 0.2s;
        }

        .bike-handlebar {
            position: absolute; bottom: -10px; left: 50%; width: 280px;
            margin-left: -140px; z-index: 5;
            transition: transform 0.08s linear;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
        }

        .balance-gauge {
            position: absolute; top: 25px; width: 70%; left: 15%; height: 6px;
            background: rgba(255,255,255,0.3); border-radius: 10px; z-index: 10;
        }
        .gauge-pointer {
            position: absolute; left: 50%; width: 4px; height: 14px; top: -4px;
            background: #ef4444; border-radius: 2px; transform: translateX(-50%);
        }

        .control-group {
            display: flex; gap: 15px; width: 100%; max-width: 400px; z-index: 10; margin-bottom: 10px;
        }
        .btn-move {
            flex: 1; padding: 25px; border-radius: 24px; border: none;
            background: white; color: #1e293b; font-size: 2rem; font-weight: 900;
            box-shadow: 0 6px 0 #e2e8f0; transition: 0.1s;
        }
        .btn-move:active { transform: translateY(3px); box-shadow: 0 3px 0 #e2e8f0; }

        .timer-badge {
            background: #e0f2fe; color: #0ea5e9; padding: 8px 25px; border-radius: 20px;
            font-weight: 900; font-size: 1.3rem; margin-top: 10px;
        }
    </style>
</head>

            <b>중심</b>을 잘 유지하여 무사히 도착하세요!
        </div>

        <div class="timer-badge" id="timer">30s</div>

        <div class="road-container" id="camera-view">
            <div class="start-overlay" id="start-overlay">
                <button class="btn-start-game" onclick="startGame()">게임 시작</button>
            </div>

            <div class="road-moving-bg" id="road-bg"></div>
            
            <div class="balance-gauge">
                <div class="gauge-pointer" id="pointer"></div>
            </div>

            <div class="bike-handlebar" id="handlebar">
                <svg viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10,50 Q20,30 50,30 L150,30 Q180,30 190,50" stroke="#334155" stroke-width="12" fill="none" stroke-linecap="round"/>
                    <rect x="5" y="45" width="30" height="14" rx="4" fill="#1e293b" transform="rotate(-15, 20, 52)"/>
                    <rect x="165" y="45" width="30" height="14" rx="4" fill="#1e293b" transform="rotate(15, 180, 52)"/>
                    <rect x="85" y="20" width="30" height="25" rx="3" fill="#1e293b"/>
                </svg>
            </div>
        </div>

        <div class="control-group">
            <button class="btn-move" onclick="pushBalance(-5)">◀</button>
            <button class="btn-move" onclick="pushBalance(5)">▶</button>
        </div>
    </main>

        const PAGE_NUM = 9;
        let tilt, time, isRunning;
        let gameLoop, timerLoop;
        
        // [추가] 난이도 제어 변수
        let failCount = 0; 

        $(document).ready(function() {
            initializeUI(PAGE_NUM);
            initGame();
        });

        function initGame() {
            tilt = 0;
            time = 15; // 15초로 단축
            isRunning = false;
            
            $('#timer').text('15s');
            $('#start-overlay').show();
            $('#road-bg').removeClass('active');
            $('#handlebar').css('transform', `rotate(0deg)`);
            $('#camera-view').css('transform', `rotate(0deg)`);
            $('#pointer').css('left', `50%`);
            
            if(gameLoop) clearInterval(gameLoop);
            if(timerLoop) clearInterval(timerLoop);
        }

        function startGame() {
            isRunning = true;
            $('#start-overlay').fadeOut();
            $('#road-bg').addClass('active');

            // [난이도 계산] 0회 실패(가장 어려움) ~ 4회 이상 실패(가장 쉬움)
            // 단계별 중력 계수: 0.07 -> 0.06 -> 0.05 -> 0.04 -> 0.03
            const difficultyLevel = Math.min(failCount, 4); 
            const gravityFactor = 0.07 - (difficultyLevel * 0.01);
            const shakeFactor = 1.5 - (difficultyLevel * 0.2);

            console.log(`현재 난이도 단계: ${difficultyLevel + 1} (중력: ${gravityFactor})`);

            gameLoop = setInterval(() => {
                if(!isRunning) return;

                // 적용된 난이도 계수 사용
                let gravity = tilt * gravityFactor; 
                let randomShake = (Math.random() - 0.5) * shakeFactor; 
                
                tilt += gravity + randomShake;

                $('#handlebar').css('transform', `rotate(${tilt}deg)`);
                $('#camera-view').css('transform', `rotate(${-tilt * 0.12}deg)`); 
                $('#pointer').css('left', `${50 + (tilt * 0.9)}%`);

                if (Math.abs(tilt) > 52) endGame(false);
            }, 40);

            timerLoop = setInterval(() => {
                if(!isRunning) return;
                time--;
                $('#timer').text(time + 's');
                if(time <= 0) endGame(true);
            }, 1000);
        }

        function pushBalance(val) {
            if(!isRunning) return;
            // 실패를 많이 할수록 버튼의 밀어주는 힘도 미세하게 보정 (보너스)
            const pushPower = val * (1 + (Math.min(failCount, 4) * 0.05));
            tilt += pushPower;
        }

        function endGame(success) {
            isRunning = false;
            clearInterval(gameLoop);
            clearInterval(timerLoop);
            $('#road-bg').removeClass('active');

            if (!success) {
                failCount++; // 실패 횟수 증가
            }

            showResultModal({
                success: success,
                message: success 
                    ? "무사히 도착했습니다! 대단한 균형 감각이에요." 
                    : "어이쿠! 균형을 잃고 말았습니다. 다시 도전하면 자전거가 조금 더 안정될 거예요!",
                onRetry: () => { 
                    initGame(); 
                },
                pageNum: PAGE_NUM
            });
        }
