<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>북극곰 프로젝트 - 인트로</title>
    
    <link rel="stylesheet" href="../lib/bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../lib/Pretendard-1.3.9/web/static/pretendard.css" />
    <link rel="stylesheet" href="../css/common.css">
    
    <style>
        :root { --main-color: #5076A1; }
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; overflow: hidden; font-family: 'Pretendard', sans-serif; }

        #video-overlay {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* 이미지 속 텍스트를 반영한 콘텐츠 영역 */
        #story-content {
            display: none; position: fixed; inset: 0;
            background: #f8fafc; z-index: 2100;
            flex-direction: column; align-items: center; justify-content: center;
            padding: 40px 25px; text-align: center;
        }

        .story-text-group {
            margin-bottom: 40px; text-align: center; word-break: keep-all;
        }
        .story-text-group p {
            font-size: 1.1rem; font-weight: 600; color: #475569;
            margin-bottom: 8px; line-height: 1.6;
        }
        .story-text-group .highlight {
            font-size: 1.3rem; font-weight: 850; color: #1e293b;
            margin-top: 20px; display: block;
        }

        .next-btn {
            width: 100%; max-width: 320px; padding: 20px; border-radius: 20px;
            background-color: var(--main-color); color: white; border: none;
            font-weight: 900; font-size: 1.3rem; box-shadow: 0 6px 15px rgba(80,118,161,0.2);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="video-overlay">
        <video id="story-video" autoplay muted playsinline webkit-playsinline>
            <source src="../img/AZyuQYOPhKkL5Z6Z7IZpXg-AZyuQYOPbSJB1wqyNcHqtw.mp4" type="video/mp4">
        </video>
    </div>

    <div id="story-content">
        <div class="story-text-group">
            <p>편지의 앞면에는 알 수 없는 글이 적혀 있다.</p>
            <p>그리고 뒷면에는 <strong>동물 발바닥 도장</strong>이 찍혀 있다.</p>
            <p>이 발바닥 모양... 어디서 본 적이 있다.</p>
            <p>도서관 벽에 붙어 있던 포스터!<br>거기에는 동물 언어를 한글로 해석하는 방법이 적혀 있었다.</p>
            <p>이건 어떤 동물이 보낸 메시지다.</p>
            <p>가만히 있을 시간이 없다.</p>
            <span class="highlight">지금 당장 도서관으로 가서<br>이 동물의 말을 한글로 해석해 보자!</span>
        </div>
        <button class="next-btn" onclick="autoGoNext()">도서관으로 이동하기</button>
    </div>

    <script src="../lib/jquery-3.6.0.min.js"></script>
    <script src="../js/common.js"></script>
    <script>
        const video = document.getElementById('story-video');
        let isTransitioned = false;

        $(document).ready(function() {
            if (typeof SetFridgeCookie === "function") {
                SetFridgeCookie('fridge_idx', 0, 24);
                SetFridgeCookie('fridge_status', 'playing', 24);
            }

            if (video) {
                video.onended = function() { showStoryContent(); };
            }

            $('#video-overlay').on('click', function() { showStoryContent(); });
        });

        function showStoryContent() {
            if (isTransitioned) return;
            isTransitioned = true;
            video.pause();
            $('#video-overlay').fadeOut(400);
            $('#story-content').delay(100).fadeIn(700).css('display', 'flex');
        }

        function autoGoNext() {
            if (typeof SetFridgeCookie === "function") {
                SetFridgeCookie('fridge_idx', 1, 24); 
            }
            location.href = 'question_1.html';
        }
    </script>
</body>
</html>
