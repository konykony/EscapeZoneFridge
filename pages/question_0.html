<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>북극곰 프로젝트 - 비밀의 실마리</title>
    
    <link rel="stylesheet" href="../lib/bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../lib/Pretendard-1.3.9/web/static/pretendard.css" />
    
    <style>
        :root { --p-blue: #5076A1; --text-dark: #1e293b; --bg-gray: #f8fafc; }
        
        body, html { margin: 0; padding: 0; height: 100%; background-color: var(--bg-gray); font-family: 'Pretendard', sans-serif; overflow: hidden; }

        #wrap { display: flex; flex-direction: column; height: 100dvh; box-sizing: border-box; }

        /* 비디오 영역 (전체 화면 재생) */
        #video-container { width: 100%; height: 100dvh; background: #000; display: flex; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; z-index: 10; }
        #story-video { width: 100%; height: 100%; object-fit: cover; }

        /* 스토리 영역 (비디오 후 등장) */
        .story-container {
            width: 100%; max-width: 420px; margin: 0 auto; padding: 40px 25px; 
            display: none; /* 비디오 재생 후 JS로 block 처리 */
            animation: fadeIn 0.6s ease-in-out;
        }

        .story-container p { font-size: 1.15rem; font-weight: 500; color: #475569; margin-bottom: 25px; line-height: 1.8; text-align: left; word-break: keep-all; }
        .story-container strong { color: #1e293b; font-weight: 800; box-shadow: inset 0 -8px 0 #e2e8f0; }

        .btn-area { width: 100%; display: flex; justify-content: center; padding: 20px 0 40px 0; margin-top: 20px; }
        .btn-next {
            width: 100%; max-width: 320px; height: 64px;
            background-color: var(--p-blue); color: #fff;
            border: none; border-radius: 18px;
            font-size: 1.25rem; font-weight: 900;
            box-shadow: 0 10px 25px rgba(80, 118, 161, 0.2);
            cursor: pointer; transition: 0.2s;
        }

        /* 영상 하단 안내 메시지 */
        #vdo-msg {
            position: absolute; bottom: 30px; left: 0; width: 100%;
            text-align: center; color: rgba(255,255,255,0.7);
            font-size: 0.9rem; font-weight: 700; z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="story-video" playsinline muted webkit-playsinline preload="auto">
            <source src="../img/AZyuQYOPhKkL5Z6Z7IZpXg-AZyuQYOPbSJB1wqyNcHqtw.mp4" type="video/mp4">
        </video>
    </div>

    <div id="vdo-msg">영상이 시작되지 않으면 화면을 터치해 주세요.</div>

    <div id="wrap">
        <div class="story-container" id="story-content">
            <p>편지 앞면에는 도무지 읽을 수 없는 복잡한 글자들이 빼곡히 적혀 있습니다.</p>
            <p>그런데 뒷면을 돌려보니 누군가 남긴 듯한 <strong>발자국</strong>이 남아 있습니다. 이 모양, 분명 어디선가 본 기억이 납니다.</p>
            <p>도서관 게시판 한구석에 붙어 있던 그 <strong>오래된 포스터</strong>에 같은 그림이 있었습니다.</p>
            <p>지금 당장 도서관으로 가서 메시지에 담긴 비밀을 풀어야 합니다.</p>
            
            <div class="btn-area">
                <button class="btn-next" onclick="goToNext()">도서관으로 이동하기</button>
            </div>
        </div>
    </div>

    <script src="../lib/jquery-3.6.0.min.js"></script>
    <script src="../js/common.js"></script>
    <script>
        const video = document.getElementById('story-video');
        const story = document.getElementById('story-content');
        const vContainer = document.getElementById('video-container');

        const playPromise = video.play();

        if (playPromise !== undefined) {
            playPromise.then(() => {
                // 자동 재생 성공
                $('#vdo-msg').text("영상이 재생 중입니다...");
                setTimeout(() => $('#vdo-msg').fadeOut(1000), 3000);
            }).catch(() => {
                // 자동 재생 차단 (사파리 등)
                $('#vdo-msg').css('color', '#60a5fa').text("화면을 터치하면 영상이 시작됩니다.");
                $(document).one('click touchstart', () => {
                    vdo.play();
                    $('#vdo-msg').text("영상이 재생 중입니다...");
                    setTimeout(() => $('#vdo-msg').fadeOut(1000), 2000);
                });
            });
        }

        // 2. 영상 종료 시 이벤트
        video.addEventListener('ended', () => {
            vContainer.style.display = 'none'; // 영상 제거
            story.style.display = 'block';    // 스토리 등장
        });

        // // 비디오 재생 종료 시 호출
        // video.onended = () => {
        //     vContainer.style.display = 'none'; // 영상 제거
        //     story.style.display = 'block';    // 스토리 등장
        // };

        function goToNext() {
            if (typeof SetFridgeCookie === "function") {
                SetFridgeCookie('fridge_idx', 1, 24);
                SetFridgeCookie('fridge_status', 'playing', 24);
            }
            location.href = 'question_1.html';
        }
    </script>
</body>
</html>
