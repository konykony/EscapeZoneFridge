<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>북극곰 프로젝트 - 스토리</title>
    
    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="../lib/bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../lib/Pretendard-1.3.9/web/static/pretendard.css" />
    <link rel="stylesheet" href="../css/common.css">
    <style>
        :root {
            --main-color: #5076A1;
            --bg-color: #F8FAFC;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-color);
            font-family: 'Pretendard', sans-serif;
            overflow-x: hidden;
        }

        /* [1] 영상 영역 */
        #video-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000; z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        /* 브라우저 기본 컨트롤 숨김 처리 */
        video::-webkit-media-controls { display: none !important; }
        video { width: 100%; height: 100%; object-fit: cover; }

        .skip-notice {
            position: absolute; bottom: 30px; color: rgba(255,255,255,0.5);
            font-size: 0.8rem; pointer-events: none;
            transition: color 0.5s;
        }

        /* [2] 콘텐츠 영역: 처음에는 완전히 숨김 */
        #story-content {
            display: none;
            flex-direction: column;
            align-items: center;
            padding: 40px 25px;
            min-height: 100vh;
            width: 100%;
        }

        /* .mission-text {
            background: white;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--main-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            font-size: 1.05rem;
            line-height: 1.6;
            font-weight: 600;
            color: #334155;
            margin-bottom: 25px;
            word-break: keep-all;
            width: 100%;
            max-width: 450px;
            text-align: center;
        } */

        .cipher-img {
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 40px;
        }

        /* [3] 다음 버튼 */
        .next-btn {
            width: 100%;
            max-width: 280px;
            padding: 18px;
            border-radius: 15px;
            background-color: var(--main-color);
            color: white;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(80,118,161,0.2);
            transition: 0.2s;
            margin-top: auto; 
            margin-bottom: 30px;
        }
        .next-btn:active { transform: scale(0.98); background-color: #3F5E81; }
    </style>
</head>
<body>

    <div id="video-overlay" onclick="skipVideo()">
        <video id="story-video" autoplay muted playsinline>
            <source src="../img/AZyuQYOPhKkL5Z6Z7IZpXg-AZyuQYOPbSJB1wqyNcHqtw.mp4" type="video/mp4">
            브라우저가 영상을 지원하지 않습니다.
        </video>
        <div class="skip-notice">영상이 나오지 않으면 화면을 클릭하세요</div>
    </div>

    <div id="story-content" class="container">
        <div class="instruction">
            "이 기호들... 도서관에서 본 적이 있어!"<br>
            확인을 위해 지금 당장 도서관으로 가야 합니다.
        </div>

        <img src="../img/opening.png" class="cipher-img" alt="Dancing Men Cipher">

        <button id="go-next" class="next-btn">도서관으로 이동하기</button>
    </div>

    <!-- jQuery -->
    <script src="../lib/jquery-3.6.0.min.js"></script>
    <script src="../js/common.js"></script>
    <script>
        const FridgeCookie = {
            set: (name, val) => {
                let d = new Date(); d.setTime(d.getTime() + (24*60*60*1000));
                document.cookie = `${name}=${encodeURIComponent(val)};expires=${d.toUTCString()};path=/`;
            }
        };

        let isSkipped = false;

        function skipVideo() {
            if (isSkipped) return;
            isSkipped = true;
            
            // 영상 정지 처리
            const video = document.getElementById('story-video');
            if(video) video.pause();

            // 전환 효과 개선: Overlay를 날리고 Content를 부드럽게 올림
            $('#video-overlay').fadeOut(500);
            $('#story-content').delay(200).fadeIn(800).css('display', 'flex');
        }

        $(document).ready(function() {
            // common.js에 정의된 초기화 함수 실행
            if (typeof initializeUI === "function") initializeUI(0); 

            // 사용자 이름 체크
            const userName = typeof GetFridgeCookie === "function" ? GetFridgeCookie('fridge_name') : "사용자";
            if(!userName && typeof GetFridgeCookie === "function"){
                window.location.href = 'error.html'; 
                return;
            }

            const video = document.getElementById('story-video');
            
            // 영상 재생 완료 시 자동 전환
            video.onended = function() {
                skipVideo();
            };

            // 5초 후 안내 문구 변경
            setTimeout(() => {
                if(!isSkipped) {
                    $('.skip-notice').css('color', '#ffffff').text('화면을 클릭하여 건너뛰기');
                }
            }, 5000);

            // 다음 버튼 클릭 이벤트
            $('#go-next').click(function() {
                const startTime = Date.now();
                FridgeCookie.set('fridge_start_time', startTime);
                FridgeCookie.set('fridge_idx', 1);
                FridgeCookie.set('fridge_status', 'playing');
                
                location.href = 'question_1.html';
            });
        });
    </script>
</body>
</html>
