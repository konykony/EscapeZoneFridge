<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>북극곰 프로젝트 - 시작</title>
    
    <link rel="stylesheet" href="../lib/bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../lib/Pretendard-1.3.9/web/static/pretendard.css" />
    <link rel="stylesheet" href="../css/common.css">
    
    <style>
        :root { --main-color: #5076A1; }
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; overflow: hidden; }

        /* 영상 영역 */
        #video-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        video::-webkit-media-controls { display: none !important; }

        .skip-notice {
            position: absolute; bottom: 30px; color: rgba(255,255,255,0.7);
            font-size: 0.85rem; font-weight: 700; pointer-events: none;
        }

        /* 영상 종료 후 나타날 미션 이동 영역 */
        #story-content {
            display: none; position: fixed; inset: 0;
            background: #f8fafc; z-index: 2100;
            flex-direction: column; align-items: center; justify-content: center;
            padding: 40px 25px; text-align: center;
        }

        .instruction { font-size: 1.2rem; font-weight: 800; color: #1e293b; line-height: 1.6; margin-bottom: 30px; }
        .next-btn {
            width: 100%; max-width: 300px; padding: 20px; border-radius: 20px;
            background-color: var(--main-color); color: white; border: none;
            font-weight: 900; font-size: 1.3rem; box-shadow: 0 6px 15px rgba(80,118,161,0.2);
        }
    </style>
</head>
<body>

    <div id="video-overlay">
        <video id="story-video" autoplay muted playsinline webkit-playsinline>
            <source src="../img/AZyuQYOPhKkL5Z6Z7IZpXg-AZyuQYOPbSJB1wqyNcHqtw.mp4" type="video/mp4">
        </video>
        <div class="skip-notice" id="notice-text">화면을 클릭하면 건너뛸 수 있습니다</div>
    </div>

    <div id="story-content">
        <div class="instruction">
            "드디어 북극곰에게 냉장고를 전해줄 시간이군요!"<br>
            첫 번째 미션을 해결하기 위해 이동해볼까요?
        </div>
        <button id="go-next" class="next-btn" onclick="goToNextStep()">미션 시작하기</button>
    </div>

    <script src="../lib/jquery-3.6.0.min.js"></script>
    <script src="../js/common.js"></script>
    <script>
        const video = document.getElementById('story-video');
        let isTransitioned = false;

        $(document).ready(function() {
            // [A] 페이지 진입 시: 현재 위치 0번 도장 찍기
            if (typeof SetFridgeCookie === "function") {
                SetFridgeCookie('fridge_idx', 0, 24);
                SetFridgeCookie('fridge_status', 'playing', 24);
            }

            // [B] 영상 종료 감지 (무한 루프 방지 핵심)
            if (video) {
                video.onended = function() {
                    showNextButton();
                };
            }

            // [C] 사파리 대응: 클릭 시 재생 시도 및 건너뛰기
            $('#video-overlay').on('click', function() {
                if (video.paused) {
                    video.play();
                    $('#notice-text').text('영상이 재생됩니다');
                } else {
                    showNextButton(); // 재생 중 클릭 시 건너뛰기
                }
            });
        });

        // 영상 종료 혹은 건너뛰기 시 실행될 함수
        function showNextButton() {
            if (isTransitioned) return;
            isTransitioned = true;

            // [D] 중요: 이제 다음은 1번이라고 쿠키 업데이트
            if (typeof SetFridgeCookie === "function") {
                SetFridgeCookie('fridge_idx', 1, 24); 
            }

            video.pause();
            $('#video-overlay').fadeOut(500);
            $('#story-content').delay(200).fadeIn(800).css('display', 'flex');
        }

        // 실제 페이지 이동 함수
        function goToNextStep() {
            // 다시 한 번 쿠키 확인 후 이동
            if (typeof SetFridgeCookie === "function") {
                SetFridgeCookie('fridge_idx', 1, 24);
            }
            location.href = 'question_1.html';
        }
    </script>
</body>
</html>
