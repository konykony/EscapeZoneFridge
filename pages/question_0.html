<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>북극곰 프로젝트 - 비밀의 실마리</title>
    
    <link rel="stylesheet" href="../lib/bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../lib/Pretendard-1.3.9/web/static/pretendard.css" />
    
    <style>
        :root { --p-blue: #5076A1; --text-dark: #1e293b; --bg-gray: #f8fafc; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background-color: var(--bg-gray); 
            font-family: 'Pretendard', sans-serif;
            color: var(--text-dark);
            overflow: hidden;
        }

        /* 세로 스크롤 영역 */
        #wrap {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            padding: 40px 25px;
            box-sizing: border-box;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .story-container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            animation: fadeIn 0.6s ease-in-out;
        }

        .story-container p {
            font-size: 1.15rem; 
            font-weight: 500; 
            color: #475569;
            margin-bottom: 25px; /* 문단 간격 유지 */
            line-height: 1.8; 
            text-align: left;
            word-break: keep-all;
        }

        .story-container strong { 
            color: #1e293b; 
            font-weight: 800; 
            box-shadow: inset 0 -8px 0 #e2e8f0;
        }

        /* 버튼 영역: 안내 박스 제거 후 텍스트와 적절한 거리 유지 */
        .btn-area {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px 0 40px 0; /* 상단 여백 조절 */
            margin-top: 20px; 
        }

        .btn-next {
            width: 100%;
            max-width: 320px;
            height: 64px;
            background-color: var(--p-blue); 
            color: #fff;
            border: none; 
            border-radius: 18px;
            font-size: 1.25rem; 
            font-weight: 900;
            box-shadow: 0 10px 25px rgba(80, 118, 161, 0.2);
            cursor: pointer;
            transition: 0.2s;
        }
        
        .btn-next:active { transform: scale(0.97); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="wrap">
        <div class="story-container">
            <p>편지 앞면에는 도무지 읽을 수 없는 복잡한 글자들이 빼곡히 적혀 있습니다.</p>
            <p>그런데 뒷면을 돌려보니 누군가 남긴 듯한 <strong>발자국</strong>이 남아 있습니다. 이 모양, 분명 어디선가 본 기억이 납니다.</p>
            <p>도서관 게시판 한구석에 붙어 있던 그 <strong>오래된 포스터</strong>에 같은 그림이 있었습니다.</p>
            <p>지금 당장 도서관으로 가서 메시지에 담긴 비밀을 풀어야 합니다.</p>
        </div>

        <div class="btn-area">
            <button class="btn-next" onclick="goToNext()">도서관으로 이동하기</button>
        </div>
    </div>

    <script src="../lib/jquery-3.6.0.min.js"></script>
    <script src="../js/common.js"></script>
    <script>
        function goToNext() {
            if (typeof SetFridgeCookie === "function") {
                SetFridgeCookie('fridge_idx', 1, 24);
                SetFridgeCookie('fridge_status', 'playing', 24);
            }
            location.href = 'question_1.html';
        }
    </script>
</body>
</html>
