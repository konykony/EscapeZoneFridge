<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>북극곰 프로젝트 - 스토리</title>
    
    <link rel="stylesheet" href="../lib/bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../lib/Pretendard-1.3.9/web/static/pretendard.css" />
    <link rel="stylesheet" href="../css/common.css">
    <style>
        :root { --main-color: #5076A1; --bg-color: #F8FAFC; }
        body, html { margin: 0; padding: 0; height: 100%; background-color: var(--bg-color); font-family: 'Pretendard', sans-serif; overflow-x: hidden; }

        #video-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        /* 사파리 기본 컨트롤 숨김 */
        video::-webkit-media-controls { display: none !important; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }

        .skip-notice {
            position: absolute; bottom: 30px; color: rgba(255,255,255,0.7);
            font-size: 0.85rem; pointer-events: none; transition: color 0.5s; font-weight: 600;
        }

        #story-content {
            display: none; flex-direction: column; align-items: center; justify-content: flex-start; 
            padding: 40px 25px; min-height: auto; width: 100%; box-sizing: border-box;
        }

        .instruction { font-size: 1.1rem; font-weight: 800; color: #334155; text-align: center; margin-top: 10px; margin-bottom: 25px; line-height: 1.5; word-break: keep-all; }
        .cipher-img { width: 100%; max-width: 450px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 30px; }

        .next-btn {
            width: 100%; max-width: 300px; padding: 18px; border-radius: 20px; background-color: var(--main-color);
            color: white; border: none; font-weight: 900; font-size: 1.2rem; box-shadow: 0 6px 15px rgba(80,118,161,0.2); transition: 0.2s; margin-top: 10px; margin-bottom: 50px;
        }
        .next-btn:active { transform: scale(0.97); background-color: #3F5E81; }
    </style>
</head>
<body>

    <div id="video-overlay" onclick="skipVideo()">
        <video id="story-video" autoplay muted playsinline webkit-playsinline preload="auto">
            <source src="../img/AZyuQYOPhKkL5Z6Z7IZpXg-AZyuQYOPbSJB1wqyNcHqtw.mp4" type="video/mp4">
        </video>
        <div class="skip-notice" id="notice-text">화면을 클릭하면 시작합니다</div>
    </div>

    <div id="story-content" class="container">
        <div class="instruction">
            "이 기호들... 도서관에서 본 적이 있어!"<br>
            확인을 위해 지금 당장 도서관으로 가야 합니다.
        </div>
        <img src="../img/opening.png" class="cipher-img" alt="Cipher">
        <button id="go-next" class="next-btn">도서관으로 이동하기</button>
    </div>

    <script src="../lib/jquery-3.6.0.min.js"></script>
    <script src="../js/common.js"></script>
    <script>
        const FridgeCookie = {
            set: (name, val) => {
                let d = new Date(); d.setTime(d.getTime() + (24*60*60*1000));
                document.cookie = `${name}=${encodeURIComponent(val)};expires=${d.toUTCString()};path=/`;
            }
        };

        let isSkipped = false;

        function skipVideo() {
            if (isSkipped) return;
            const video = document.getElementById('story-video');
            
            // [사파리 대응] 클릭 시점에 비디오가 멈춰있다면 강제 재생
            if (video.paused) {
                video.play().catch(e => console.log("Play failed:", e));
                $('#notice-text').text('영상이 재생됩니다 (한 번 더 클릭 시 건너뛰기)');
                return; // 첫 클릭은 재생만 시키고 종료
            }

            isSkipped = true;
            video.pause();
            $('#video-overlay').fadeOut(500);
            $('#story-content').delay(200).fadeIn(800).css('display', 'flex');
        }

        $(document).ready(function() {
            const urlParams = new URLSearchParams(window.location.search);
            const isTestMode = (urlParams.get('type') || "").toLowerCase() === 'test';

            if (typeof initializeUI === "function") initializeUI(0); 

            if (!isTestMode) {
                const userName = typeof GetFridgeCookie === "function" ? GetFridgeCookie('fridge_name') : null;
                if (!userName) { window.location.href = 'error.html'; return; }
            }

            const video = document.getElementById('story-video');

            // [핵심] 사파리 자동재생 시도 및 실패 처리
            let playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    // 자동 재생 차단됨 -> 안내 문구 변경
                    $('#notice-text').css('color', '#fff').text('화면을 클릭하면 시작합니다');
                });
            }

            if (video) {
                video.onended = function() { skipVideo(); };
            }

            // 5초 후 안내 문구 업데이트
            setTimeout(() => {
                if (!isSkipped) {
                    $('#notice-text').css('color', '#ffffff').text('화면을 클릭하여 건너뛰기');
                }
            }, 5000);

            $('#go-next').click(function() {
                const startTime = Date.now();
                const nextUrl = isTestMode ? 'question_1.html?type=test' : 'question_1.html';

                if (!isTestMode) {
                    if (typeof SetFridgeCookie === "function") {
                        SetFridgeCookie('fridge_start_time', startTime, 24);
                        SetFridgeCookie('fridge_idx', 1, 24);
                        SetFridgeCookie('fridge_status', 'playing', 24);
                    }
                }
                location.href = nextUrl;
            });
        });
    </script>
</body>
</html>
