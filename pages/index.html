<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>북극곰에게 냉장고를 - 시작</title>
    
    <link rel="stylesheet" href="../lib/bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../lib/Pretendard-1.3.9/web/static/pretendard.css" />
    
    <style>
        :root {
            --main-color: #5076A1;
            --bg-color: #F8FAFC;
        }

        body, html { 
            background-color: var(--bg-color); 
            font-family: 'Pretendard', sans-serif; 
            height: 100%; 
            margin: 0; padding: 0;
            color: #334155;
            /* 바깥쪽 스크롤바 숨김 */
            overflow: hidden; 
            -webkit-user-select: none;
            user-select: none;
        }

        /* [핵심] 컨테이너에 세로 스크롤을 넣었습니다 */
        .index-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100dvh; /* 전체 화면 높이 */
            padding: 40px 20px; 
            box-sizing: border-box; 
            
            /* 세로 스크롤 설정 */
            overflow-y: auto; 
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch; /* 아이폰 부드러운 스크롤 */
        }

        .content-wrapper {
            width: 100%;
            max-width: 340px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 하단 버튼이 푸터 등에 가리지 않게 여백 추가 */
            padding-bottom: 50px; 
        }
        
        .image-cover { 
            width: 100%; 
            height: auto;
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            margin-bottom: 30px; 
            display: block;
            flex-shrink: 0; /* 이미지 찌그러짐 방지 */
        }

        .input-group-custom { 
            display: none; 
            width: 100%;
            margin-bottom: 15px; 
        } 

        .user-input { 
            width: 100%; 
            padding: 18px; 
            border-radius: 20px; 
            border: 2px solid #CBD5E1; 
            text-align: center; 
            font-size: 1.1rem; 
            font-weight: 700;
            background: white;
            box-sizing: border-box;
            outline: none;
            -webkit-user-select: text;
            user-select: text;
        }

        .btn-group-custom {
            display: flex;
            width: 100%;
            gap: 12px;
            margin-top: 10px;
        }

        .start-btn { 
            flex: 3; 
            border-radius: 20px; 
            font-weight: 900; 
            font-size: 1.2rem; 
            background-color: var(--main-color); 
            border: none; 
            padding: 20px 0; 
            color: white; 
            box-shadow: 0 8px 18px rgba(80,118,161,0.25); 
            white-space: nowrap;
        }

        .reset-btn {
            flex: 1.2; 
            border-radius: 20px;
            font-weight: 800;
            font-size: 1rem;
            background-color: #E2E8F0;
            color: #64748B;
            border: none;
            padding: 20px 0;
            display: none;
        }

        .start-btn:active, .reset-btn:active { 
            transform: scale(0.96); 
            opacity: 0.9; 
        }
    </style>
</head>
<body>

    <div class="index-container">
        <div class="content-wrapper">
            <img src="../img/book_cover.png" id="cover-image" class="image-cover" alt="Cover">

            <div id="name-input-section" class="input-group-custom">
                <input type="text" id="user-name" class="user-input" placeholder="이름을 입력해 주세요" maxlength="10">
            </div>

            <div id="button-group" class="btn-group-custom">
                <button id="main-btn" class="start-btn">시작하기</button>
                <button id="reset-btn" class="reset-btn" onclick="location.href='reset.html'">초기화</button>
            </div>
        </div>
    </div>

    <script src="../lib/jquery-3.6.0.min.js"></script>
    <script>
        const FridgeCookie = {
            set: (name, val) => {
                let d = new Date();
                d.setTime(d.getTime() + (24 * 60 * 60 * 1000));
                document.cookie = `${name}=${encodeURIComponent(val)};expires=${d.toUTCString()};path=/`;
            },
            get: (name) => {
                let v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
                return v ? decodeURIComponent(v[2]) : null;
            }
        };

        $(document).ready(function() {
            const savedName = FridgeCookie.get('fridge_name');
            
            if (savedName) {
                $('#main-btn').text('이어서 진행하기');
                $('#reset-btn').css('display', 'block');
                $('#name-input-section').hide();
            } else {
                $('#name-input-section').show();
            }

            $('#main-btn').click(function() {
                const currentName = FridgeCookie.get('fridge_name');
                if (!currentName) {
                    const name = $('#user-name').val().trim();
                    if (!name) { alert("이름을 입력해주세요!"); return; }
                    FridgeCookie.set('fridge_start_time', Date.now());
                    FridgeCookie.set('fridge_name', name);
                    FridgeCookie.set('fridge_idx', '0'); 
                    FridgeCookie.set('fridge_status', 'playing');
                    location.href = 'question_0.html';
                } else {
                    const idx = FridgeCookie.get('fridge_idx') || '0';
                    location.href = isNaN(idx) ? 'question_0.html' : `question_${idx}.html`;
                }
            });
        });
    </script>
</body>
</html>
