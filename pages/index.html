<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>북극곰에게 냉장고를 - 시작</title>
    
    <link rel="stylesheet" href="../lib/bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../lib/Pretendard-1.3.9/web/static/pretendard.css" />
    
    <style>
        :root {
            --main-color: #5076A1; /* 스틸 블루 */
            --bg-color: #F8FAFC;   /* 부드러운 배경색 */
        }

        /* 1. 기본 레이아웃: 상단 정렬 및 아이폰 대응 */
        body, html { 
            background-color: var(--bg-color); 
            font-family: 'Pretendard', sans-serif; 
            height: 100dvh; /* Dynamic Viewport 적용 */
            margin: 0; padding: 0;
            overflow: hidden; 
            color: #334155;
            -webkit-user-select: none;
            user-select: none;
        }

        .index-container { 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; 
            align-items: center; 
            height: 100%; 
            padding: 40px 30px; 
            box-sizing: border-box; 
        }
        
        /* 2. 표지 이미지: 버튼 공간 확보를 위한 가변 높이 */
        .image-cover { 
            max-height: 45vh; 
            width: auto; 
            max-width: 100%;
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            margin-bottom: 25px; 
            display: block; 
            flex-shrink: 0;
        }

        /* 3. 입력 영역 */
        .input-group-custom { 
            display: none; 
            width: 100%;
            max-width: 320px;
            margin-bottom: 15px; 
            flex-shrink: 0;
        } 

        .user-input { 
            width: 100%; 
            padding: 16px; 
            border-radius: 18px; 
            border: 2px solid #CBD5E1; 
            text-align: center; 
            font-size: 1.1rem; 
            font-weight: 700;
            background: white;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
            -webkit-user-select: text; /* 입력창은 선택 가능하게 */
            user-select: text;
        }
        .user-input:focus { border-color: var(--main-color); }

        /* 4. 버튼 그룹 레이아웃 */
        .btn-group-custom {
            display: flex;
            width: 100%;
            max-width: 320px;
            gap: 10px;
            flex-shrink: 0;
        }

        .start-btn { 
            flex: 3; /* 주 버튼 비중 확대 */
            border-radius: 18px; 
            font-weight: 900; 
            font-size: 1.15rem; 
            background-color: var(--main-color); 
            border: none; 
            padding: 18px 0; 
            color: white; 
            box-shadow: 0 6px 15px rgba(80,118,161,0.2); 
            transition: 0.2s; 
            cursor: pointer;
            white-space: nowrap;
        }

        /* 초기화 버튼 (데이터가 있을 때만 노출) */
        .reset-btn {
            flex: 1; /* 부 버튼 비중 축소 */
            border-radius: 18px;
            font-weight: 800;
            font-size: 0.9rem;
            background-color: #E2E8F0;
            color: #64748B;
            border: none;
            padding: 18px 0;
            cursor: pointer;
            transition: 0.2s;
            display: none; /* JS 제어 */
        }

        .start-btn:active, .reset-btn:active { 
            transform: scale(0.97); 
            filter: brightness(0.9); 
        }

        /* 키보드가 올라올 때 이미지 크기 조정 */
        @media (max-height: 550px) {
            .image-cover { max-height: 30vh; }
            .index-container { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="index-container">
        <img src="../img/book_cover.png" id="cover-image" class="image-cover" alt="Cover">

        <div id="name-input-section" class="input-group-custom">
            <input type="text" id="user-name" class="user-input" placeholder="이름을 입력해 주세요" maxlength="10">
        </div>

        <div id="button-group" class="btn-group-custom">
            <button id="main-btn" class="start-btn">시작하기</button>
            <button id="reset-btn" class="reset-btn" onclick="location.href='reset.html'">초기화</button>
        </div>
    </div>

    <script src="../lib/jquery-3.6.0.min.js"></script>
    <script>
        // [Fridge Cookie 유틸리티]
        const FridgeCookie = {
            set: (name, val) => {
                let d = new Date();
                d.setTime(d.getTime() + (24 * 60 * 60 * 1000));
                document.cookie = `${name}=${encodeURIComponent(val)};expires=${d.toUTCString()};path=/`;
            },
            get: (name) => {
                let v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
                return v ? decodeURIComponent(v[2]) : null;
            }
        };

        $(document).ready(function() {
            const savedName = FridgeCookie.get('fridge_name');
            const savedIdx = FridgeCookie.get('fridge_idx');
            const status = FridgeCookie.get('fridge_status');

            // [Logic] 페이지 로드 시 상태 체크 및 UI 분기
            if (status === 'finished') {
                location.href = 'finish.html'; 
            } else if (savedName) {
                // 이름 데이터가 있으면 '이어하기' 모드
                $('#main-btn').text('이어서 진행하기');
                $('#reset-btn').show(); 
                $('#name-input-section').hide();
            } else {
                // 데이터가 없으면 '새 게임' 모드
                $('#main-btn').text('시작하기');
                $('#reset-btn').hide();
                $('#name-input-section').show();
            }

            // 시작/이어하기 버튼 클릭 이벤트
            $('#main-btn').click(function() {
                const currentName = FridgeCookie.get('fridge_name');
                if (!currentName) {
                    // 새 게임 시작
                    const name = $('#user-name').val().trim();
                    if (!name) { 
                        alert("이름을 입력해주세요!"); 
                        return; 
                    }
                    const startTime = Date.now();
                    FridgeCookie.set('fridge_start_time', startTime);
                    FridgeCookie.set('fridge_name', name);
                    FridgeCookie.set('fridge_idx', 0);
                    FridgeCookie.set('fridge_status', 'playing');
                    location.href = 'question_0.html';
                } else {
                    // 이어하기
                    const idx = FridgeCookie.get('fridge_idx') || 0;
                    location.href = `question_${idx}.html`;
                }
            });

            // 이미지 너비에 맞춰 컨트롤 영역 너비 동기화 (레이아웃 안정화)
            $('#cover-image').on('load', function() {
                const imgWidth = $(this).width();
                if (imgWidth > 100) {
                    $('#button-group, #name-input-section').css('width', imgWidth + 'px');
                }
            }).each(function() {
                if(this.complete) $(this).trigger('load');
            });
        });
    </script>
</body>
</html>
