<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>북극곰 프로젝트 - 문제 2</title>
    <!-- Bootstrap 5 CSS -->
     
    <link rel="stylesheet" href="../lib/bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../lib/Pretendard-1.3.9/web/static/pretendard.css" />
    <link rel="stylesheet" href="../css/common.css">
    <style>
        /* 1. 전체 레이아웃 설정 */
        body, html { 
            overflow: hidden; 
            background-color: #f8fafc; 
            margin: 0; padding: 0; 
        }
        
        main {
            /* 헤더와 푸터의 높이를 제외한 나머지 공간 사용 */
            height: calc(100vh - var(--header-height, 60px) - var(--footer-height, 60px));
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            /* [핵심] 상단 정렬로 변경하여 위로 밀착시킴 */
            justify-content: flex-start; 
            padding: 15px 20px; 
            gap: 15px; /* 요소들 사이의 자연스러운 간격 */
            position: relative;
            box-sizing: border-box;
        }

        /* 도서관 배경 분위기 연출 (주석 해제 시 사용 가능) */
        .library-backdrop {
            position: absolute; inset: 0;
            background: linear-gradient(rgba(248, 250, 252, 0.9), rgba(248, 250, 252, 0.9));
            z-index: -1;
        }

        /* 2. 지시문 영역 슬림화 */
        .instruction { 
            font-size: 1.05rem; 
            font-weight: 800; 
            color: #334155; 
            text-align: center; 
            margin-top: 5px;
            line-height: 1.4;
            word-break: keep-all; 
        }

        /* 3. 암호 편지 박스 (크기 및 여백 최적화) */
        .letter-box {
            width: 100%; 
            max-width: 420px;
            background: #fff; 
            padding: 8px; 
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06); 
            border: 1px solid #e2e8f0;
        }
        .letter-img { 
            width: 100%; 
            border-radius: 15px; 
            display: block;
        }

        /* 4. 입력 및 제출 영역 (버튼 위치 상향) */
        .input-group-custom { 
            width: 100%; 
            max-width: 360px; 
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .answer-field {
            width: 100%; 
            padding: 16px; 
            border-radius: 18px; 
            border: 2px solid #cbd5e1;
            font-size: 1.15rem; 
            font-weight: 800; 
            text-align: center;
            outline: none; 
            transition: 0.3s; 
            background: white;
            box-sizing: border-box;
        }
        .answer-field:focus { 
            border-color: var(--main-color, #5076a1); 
            box-shadow: 0 0 15px rgba(80,118,161,0.1); 
        }

        .btn-submit {
            width: 100%; 
            padding: 16px; 
            border-radius: 18px; 
            border: none;
            background-color: var(--main-color, #5076a1); 
            color: white;
            font-size: 1.2rem; 
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.2s;
            box-shadow: 0 4px 12px rgba(80,118,161,0.2);
        }
        .btn-submit:active { transform: scale(0.97); }

        /* 5. 해독표 찾기 트리거 (상단 고정) */
        .wall-inspect-trigger {
            position: absolute; 
            right: 15px; 
            top: 15px;
            width: 54px; 
            height: 54px; 
            border-radius: 50%;
            background: white; 
            border: 2px solid #e2e8f0;
            display: flex; 
            align-items: center; 
            justify-content: center;
            cursor: pointer; 
            font-size: 1.1rem; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 100;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 
            0% { box-shadow: 0 0 0 0 rgba(80,118,161,0.4); } 
            70% { box-shadow: 0 0 0 10px rgba(80,118,161,0); } 
            100% { box-shadow: 0 0 0 0 rgba(80,118,161,0); } 
        }

        /* 6. 모달 레이어 */
        #decoding-overlay {
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(15, 23, 42, 0.95);
            z-index: 5000; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }
        .decoding-wrap { position: relative; width: 100%; max-width: 500px; }
        .decoding-img { width: 100%; border-radius: 15px; border: 3px solid #fff; }
        .btn-close-decoding { 
            position: absolute; 
            top: -45px; 
            right: 0; 
            color: white; 
            font-size: 1.3rem; 
            font-weight: 900; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <!-- 상단 공통 헤더 (common.js에서 생성) -->
    <header id="common-header"></header>

    <main>
        <div class="library-backdrop"></div>
        
        <!-- 벽면 조사 트리거 (해독표 찾기) -->
        <!-- <div class="wall-inspect-trigger" onclick="openDecodingTable()">🔍</div> -->

        <div class="instruction">
            도서관에 도착했습니다.<br><strong>알맞은 해독표</strong>를 찾아 편지를 해독하세요.
        </div>

        <!-- 춤추는 사람 암호 이미지 (image_78abc9.png) -->
        <div class="letter-box">
            <img src="../img/secret_code.png" class="letter-img" alt="동물언어 편지">
        </div>

        <!-- 입력 영역 -->
        <div class="input-group-custom">
            <input type="text" id="user-answer" class="answer-field" placeholder="해독한 내용을 입력하세요" autocomplete="off">
            <button class="btn-submit" onclick="validate()">해독 완료</button>
        </div>
    </main>

    <!-- 하단 공통 푸터 (common.js에서 생성) -->
    <footer id="common-footer"></footer>

    <!-- 곰 발바닥 해독표 모달 (secret_code.jpg) -->
    <div id="decoding-overlay">
        <div class="decoding-wrap">
            <span class="btn-close-decoding" onclick="closeDecodingTable()">닫기 ✕</span>
            <img src="../img/secret_code.png" class="decoding-img" alt="곰발바닥 해독표">
        </div>
    </div>

    <!-- 로직 스크립트 -->
    <script src="../lib/jquery-3.6.0.min.js"></script>
    <script src="../js/common.js"></script> <!-- 통합된 공통 JS 파일 -->
    
    <script>
        const PAGE_NUM = 2;
        const CORRECT_ANSWER_CLEAN = "냉장고보내줘"; // 공백 제거 기준 정답

        // 요청하신 3단계 힌트 구성
        window.hints = [
            "도서관에서 곰 발바닥 그림이 있는 해독표를 찾아 보세요.",
            "정답은 총 6글자 입니다.",
            "첫 번째 글자는 '냉' 입니다."
        ];

        $(document).ready(function() {
            initializeUI(2); 
            // // UI 초기화
            // if (typeof initializeUI === 'function') initializeUI(PAGE_NUM);
            
            // // 힌트 버튼 동작 할당
            // $('.hint-btn').each(function(idx) {
            //     $(this).off().on('click', function() {
            //         alert(`[힌트 ${idx + 1}단계]\n\n${HINT_DATA[idx]}`);
            //     });
            // });
        });

        // 해독표 열기/닫기
        function openDecodingTable() { $('#decoding-overlay').css('display', 'flex').hide().fadeIn(300); }
        function closeDecodingTable() { $('#decoding-overlay').fadeOut(300); }

        // 정답 검증
        function validate() {
            const val = $('#user-answer').val().trim();
            const processedVal = val.replace(/\s+/g, ""); // 모든 공백 제거

            const isCorrect = (processedVal === CORRECT_ANSWER_CLEAN);

            // 통합 COMMON JS의 결과 모달 호출
            showResultModal({
                success: isCorrect,
                message: isCorrect ? '성공적으로 암호를 해독했습니다!' : '해독한 내용이 잘못되었습니다. 해독표를 다시 꼼꼼히 살펴보세요.',
                onRetry: () => { $('#user-answer').val('').focus(); },
                pageNum: 2
            });
        }
    </script>
</body>
</html>
