<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>북극곰 프로젝트 - 기록 인증</title>
    
    <link rel="stylesheet" href="../lib/bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../lib/Pretendard-1.3.9/web/static/pretendard.css" />
    <link rel="stylesheet" href="../css/common.css">

    <style>
        * { box-sizing: border-box !important; }
        body, html { 
            background: #ffffff !important; height: 100%; margin: 0; padding: 0; 
            overflow: hidden; font-family: 'Pretendard', sans-serif;
            display: flex; align-items: center; justify-content: center;
        }
        
        #wrap { 
            background: #ffffff !important; border: none !important; 
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        #rotate-wrapper {
            width: 100vh; 
            height: 100vw; 
            transform: rotate(90deg); 
            transform-origin: center center;
            display: flex; 
            align-items: center; 
            justify-content: center;
            background: #ffffff !important;
            /* [추가] 테두리가 잘리지 않도록 안쪽 여백 부여 */
            padding: 20px; 
            box-sizing: border-box;
        }

        .cert-container {
            /* [핵심] 회전 후 좌우 길이는 화면 높이(vh)의 92~95%가 적당합니다. */
            width: 94vh; 
            
            /* [핵심] 회전 후 상하 높이는 화면 너비(vw)의 비율로 조절합니다. */
            height: auto; /* 내용에 따라 유동적으로 */
            max-height: 85vw; 
            
            /* 과도한 고정 픽셀값 제거 */
            min-width: unset; 
            
            background: #ffffff; 
            border: 8px solid #1d4ed8; 
            border-radius: 40px;
            padding: 30px; 
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            gap: 15px;
            
            /* 테두리 잘림 방지 */
            box-sizing: border-box; 
        }

        /* [수정] 책 제목 상단 배치 (진한 색상으로 변경하여 눈에 띄게 함) */
        .book-title { 
            font-size: 1.5rem; font-weight: 800; color: #1d4ed8; 
            margin-bottom: 15px; letter-spacing: -0.02rem;
        }

        /* [수정] OO님 방탈출 성공! 문구 통합 및 스타일링 */
        .success-info { font-size: 2rem; font-weight: 800; color: #617085; margin-bottom: 25px; }
        .success-info b { color: #1d4ed8; font-weight: 900; font-size: 2rem; }

        /* 기록 박스 */
        .record-display {
            background: #f8fafc; border-radius: 30px; 
            padding: 20px 40px; width: 95%;
            display: flex; align-items: center; justify-content: center;
        }
        
        /* 글자 크기도 화면 높이에 반응하도록 살짝 조정 (선택사항) */
        .time-text { 
            font-size: 15vh; /* 고정 rem 대신 vh를 쓰면 화면 크기에 따라 글자도 조절됩니다 */
            font-weight: 950; 
            color: #0f172a; 
            line-height: 1; 
            letter-spacing: -0.5vh; 
            white-space: nowrap; 
            display: flex; 
            align-items: baseline;
        }
        .time-text i { 
            font-style: normal; font-size: 2.8rem; font-weight: 900; 
            color: #334155; margin-left: 12px; margin-right: 30px; 
        }
        .time-text i:last-child { margin-right: 0; }

        .bottom-area { display: none !important; }
    </style>
</head>
<body>
    <div id="wrap">
        <div id="rotate-wrapper">
            <div class="cert-container">
                <div class="header-info">
                    <div class="book-title">[북극곰에게 냉장고를 보내줘야겠어]</div>
                    
                    <div class="success-info">
                        <b id="res-name">코니</b>님 방탈출 성공!
                    </div>
                </div>

                <div class="record-display">
                    <div class="time-text" id="res-time">
                        00<i>분</i>00<i>초</i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../lib/jquery-3.6.0.min.js"></script>
    <script src="../js/common.js"></script>
    <script>
       $(document).ready(() => {
            // [중요] 페이지 로드 시 기록 존재 여부 즉시 확인
            const startTime = GetFridgeCookie('fridge_start_time');
            
            if (!startTime || startTime === "" || startTime === "undefined") {
                // 기록이 없으면 알림 없이 즉시 인덱스 페이지로 이동
                location.replace('index.html'); 
                return;
            }

            showFinalRecord(startTime);
        });

        function showFinalRecord(startTime) {
            const name = GetFridgeCookie('fridge_name'); 
            const endTime = GetFridgeCookie('fridge_end_time') || new Date().getTime();

            // 이름 적용
            $('#res-name').text(name || '코니');

            // 소요 시간 계산
            const diff = Math.floor((endTime - startTime) / 1000);
            const h = Math.floor(diff / 3600);
            const m = Math.floor((diff % 3600) / 60);
            const s = diff % 60;

            const timeBox = $('#res-time');
            let timeHtml = "";

            if (h > 0) {
                timeHtml += `${h}<i>시</i>`;
            }
            timeHtml += `${m < 10 ? '0'+m : m}<i>분</i>${s < 10 ? '0'+s : s}<i>초</i>`;
            timeBox.html(timeHtml);
        }
    </script>
</body>
</html>
