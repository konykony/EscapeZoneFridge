<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>북극곰 프로젝트 - 문제 3</title>
    
    <link rel="stylesheet" href="../lib/bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../lib/Pretendard-1.3.9/web/static/pretendard.css" />
    <link rel="stylesheet" href="../css/common.css">

    <style>
        body, html { margin: 0; padding: 0; height: 100vh; background-color: var(--bg-color); font-family: 'Pretendard', sans-serif; overflow: hidden; }

        main {
            margin-top: var(--header-height);
            height: calc(100vh - var(--header-height) - var(--footer-height));
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; position: relative;
        }

        /* 컴퓨터 모니터 스타일 - 슬림하게 조정 */
        .monitor-frame {
            width: 100%; max-width: 280px;
            background: #334155; padding: 15px; border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2); border: 6px solid #475569;
        }

        /* 숫자 표시창 */
        .pass-display {
            width: 100%; height: 50px; background: #0f172a;
            border-radius: 10px; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center;
            gap: 12px; border: 2px solid #1e293b;
        }
        .pass-dot {
            width: 15px; height: 15px; border-radius: 50%;
            background: #334155; transition: 0.2s;
        }
        .pass-dot.active { background: #60a5fa; box-shadow: 0 0 15px #60a5fa; }

        /* 키패드 스타일 - 모든 버튼 규격 통일 */
        .keypad {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
        }
        .key-btn {
            height: 50px; width: 100%; background: #475569; color: white;
            border: none; border-radius: 12px; font-size: 1.3rem; font-weight: 800;
            cursor: pointer; transition: 0.1s; display: flex; align-items: center; justify-content: center;
        }
        .key-btn:active { background: #60a5fa; transform: scale(0.95); }
        
        /* 기능 버튼 색상 및 폰트 크기 미세 조정 */
        .key-btn.clear { background: #ef4444; font-size: 1.1rem; }
        .key-btn.ok-btn { background: #22c55e; font-size: 1.1rem; }

        /* 이용 규칙 버튼 스타일 */
        .rules-trigger {
            position: absolute; left: 20px; top: 10px;
            width: 50px; height: 60px; background: white;
            border: 1px solid #cbd5e1; box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            cursor: pointer; transform: rotate(-5deg); display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 800; text-align: center;
        }

        /* 규칙 모달 */
        #rules-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            z-index: 5000; align-items: center; justify-content: center; padding: 20px;
        }
        .rules-wrap { position: relative; width: 100%; max-width: 500px; }
        .rules-img { width: 100%; border-radius: 10px; }
        .close-rules { position: absolute; top: -45px; right: 0; color: white; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

    <header id="common-header"></header>

    <main>
        <!-- 도서관 벽에 붙은 규칙 트리거 (필요 시 주석 해제) -->
        <!-- <div class="rules-trigger" onclick="toggleRules(true)">이용<br>규칙</div> -->

        <div class="text-center mb-3">
            <h5 class="fw-bold">🔒 컴퓨터 잠금 해제</h5>
            <p class="text-muted small">비밀번호 4자리를 입력하세요.</p>
        </div>

        <div class="monitor-frame">
            <div class="pass-display">
                <div class="pass-dot" id="dot-0"></div>
                <div class="pass-dot" id="dot-1"></div>
                <div class="pass-dot" id="dot-2"></div>
                <div class="pass-dot" id="dot-3"></div>
            </div>

            <div class="keypad">
                <button class="key-btn" onclick="pressKey('1')">1</button>
                <button class="key-btn" onclick="pressKey('2')">2</button>
                <button class="key-btn" onclick="pressKey('3')">3</button>
                <button class="key-btn" onclick="pressKey('4')">4</button>
                <button class="key-btn" onclick="pressKey('5')">5</button>
                <button class="key-btn" onclick="pressKey('6')">6</button>
                <button class="key-btn" onclick="pressKey('7')">7</button>
                <button class="key-btn" onclick="pressKey('8')">8</button>
                <button class="key-btn" onclick="pressKey('9')">9</button>
                <button class="key-btn clear" onclick="pressKey('C')">C</button>
                <button class="key-btn" onclick="pressKey('0')">0</button>
                <button class="key-btn ok-btn" onclick="validate()">OK</button>
            </div>
        </div>
    </main>

    <footer id="common-footer"></footer>

    <div id="rules-modal">
        <div class="rules-wrap">
            <span class="close-rules" onclick="toggleRules(false)">닫기 ✕</span>
            <img src="library_rules.png" class="rules-img" alt="도서관 이용 규칙">
        </div>
    </div>

    <script src="../lib/jquery-3.6.0.min.js"></script>
    <script src="../js/common.js"></script>

    <script>
        const PAGE_NUM = 3;
        const CORRECT_PW = "1223";
        let currentInput = "";

        window.hints = [
            "도서관 벽에 붙어 있는 '도서관 이용 규칙' 종이를 찾아보세요!",
            "이용 규칙 글자들 중에서 굵은 글자들을 순서대로 읽어보세요.",
            "비밀번호는 '일이이삼'이에요. 컴퓨터를 열어 북극곰의 비밀을 확인하세요!"
        ];

        $(document).ready(function() {
            initializeUI(PAGE_NUM);
        });

        function toggleRules(show) {
            $('#rules-modal').css('display', show ? 'flex' : 'none');
        }

        function pressKey(key) {
            if (key === 'C') {
                currentInput = "";
            } else if (currentInput.length < 4) {
                currentInput += key;
            }
            updateDisplay();
        }

        function updateDisplay() {
            $('.pass-dot').removeClass('active');
            for (let i = 0; i < currentInput.length; i++) {
                $(`#dot-${i}`).addClass('active');
            }
        }

        function validate() {
            if (currentInput.length < 4) {
                alert("비밀번호 4자리를 모두 입력해주세요.");
                return;
            }

            const isCorrect = (currentInput === CORRECT_PW);

            showResultModal({
                success: isCorrect,
                message: isCorrect ? '잠금이 해제되었습니다! 메시지를 확인합니다.' : '비밀번호가 틀렸습니다. 이용 규칙을 확인해보세요.',
                onRetry: () => { 
                    currentInput = "";
                    updateDisplay();
                },
                pageNum: 3
            });
        }
    </script>
</body>
</html>
