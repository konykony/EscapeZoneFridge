<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>북극곰 프로젝트 - 문제 11</title>
    
    <link rel="stylesheet" href="../lib/bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../lib/Pretendard-1.3.9/web/static/pretendard.css" />
    <link rel="stylesheet" href="../css/common.css">

    <style>
        :root {
            --p-blue: #3b82f6;
            --card-back: #1e293b;
        }
        body, html { background-color: #f1f5f9; -webkit-user-select:none; user-select:none; margin: 0; padding: 0; }
        
        main { 
            min-height: calc(100vh - var(--header-height, 60px) - var(--footer-height, 60px)); 
            display: flex; flex-direction: column; align-items: center; padding: 15px; 
        }

        /* [요청반영] 스토리 연결 문구 적용 */
        .instruction {
            width: 100%; max-width: 480px; background: #ffffff; border: 2px solid var(--p-blue); 
            border-radius: 15px; padding: 15px; margin-bottom: 20px; text-align: center;
            font-weight: 700; color: #1e40af; font-size: 1rem; line-height: 1.6;
            word-break: keep-all;
        }

        /* 5열 4행 그리드 */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 500px;
            perspective: 1000px;
        }

        .memory-card {
            aspect-ratio: 3 / 4;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .memory-card.flipped { transform: rotateY(180deg); }
        .memory-card.matched { opacity: 0.4; cursor: default; pointer-events: none; }

        .card-face {
            position: absolute; inset: 0;
            backface-visibility: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 2px solid #fff;
        }

        .card-front { background-color: var(--card-back); }
        .card-front::after { content: '❄️'; font-size: 1.2rem; opacity: 0.5; }

        .card-back-view {
            background-color: white; color: #1e293b;
            transform: rotateY(180deg); border: 2px solid var(--p-blue);
        }
        
        .tool-icon { font-size: 1.5rem; margin-bottom: 5px; }
        .tool-name { font-size: 0.75rem; font-weight: 800; letter-spacing: -0.5px; text-align: center; }
    </style>
</head>
<body>
    <header id="common-header"></header>

    <main>
        <div class="instruction">
            행사장 입구도 찾았으니, 이제 본격적으로 나무를 심을 시간이에요! 
            숲을 가꾸기 위해 창고에서 나무 심기에 필요한 도구들을 찾아 보세요.
        </div>

        <div class="card-grid" id="card-grid">
            </div>
    </main>

    <footer id="common-footer"></footer>

    <script src="../lib/jquery-3.6.0.min.js"></script>
    <script src="../js/common.js"></script>
    <script>

        // 힌트 데이터
        window.hints = [
            "카드 뒤에 숨겨진 도구들의 모양을 잘 기억해 보세요.",
            "똑같이 생긴 도구 그림 두 개를 찾아서 선택하면 짝이 맞춰집니다.",
            "삽은 삽끼리, 곡괭이는 곡괭이끼리! 같은 모양의 도구를 모두 찾으면 성공입니다."
        ];
        const PAGE_NUM = 11;
        const tools = [
            { name: "삽", icon: "🥄" }, { name: "곡괭이", icon: "⛏️" }, 
            { name: "쇠갈퀴", icon: "🔱" }, { name: "묘목", icon: "🌱" }, 
            { name: "비료", icon: "💩" }, { name: "상토", icon: "⛰️" }, 
            { name: "물뿌리개", icon: "🚿" }, { name: "목장갑", icon: "🧤" }, 
            { name: "이름표", icon: "🏷️" }, { name: "전정가위", icon: "✂️" }
        ];

        let cardData = [...tools, ...tools]; 
        let firstCard = null, secondCard = null, lockGrid = false, matches = 0;

        $(document).ready(() => {
            initializeUI(PAGE_NUM);
            if(typeof applyTempBarColor === 'function') applyTempBarColor(PAGE_NUM);
            setupGame();
        });

        function setupGame() {
            cardData.sort(() => Math.random() - 0.5);
            const grid = $('#card-grid');
            grid.empty();

            cardData.forEach((item) => {
                const cardHtml = `
                    <div class="memory-card" data-name="${item.name}">
                        <div class="card-face card-front"></div>
                        <div class="card-face card-back-view">
                            <span class="tool-icon">${item.icon}</span>
                            <span class="tool-name">${item.name}</span>
                        </div>
                    </div>
                `;
                grid.append(cardHtml);
            });

            $('.memory-card').on('click', function() {
                if (lockGrid || $(this).hasClass('flipped') || $(this).hasClass('matched')) return;
                $(this).addClass('flipped');
                if (!firstCard) { firstCard = $(this); return; }
                secondCard = $(this);
                lockGrid = true;
                checkMatch();
            });
        }

        function checkMatch() {
            const isMatch = firstCard.data('name') === secondCard.data('name');

            if (isMatch) {
                // [요청반영] 맞추면 1초간 대기
                setTimeout(() => {
                    firstCard.addClass('matched');
                    secondCard.addClass('matched');
                    matches++;
                    
                    if (matches === tools.length) {
                        // if (typeof runTemperatureSequence === 'function') {
                        //     runTemperatureSequence(PAGE_NUM);
                        // } else {
                        //     location.href = "question_12.html";
                        // }
                        
                        showResultModal({ success: true, message: "도구를 모두 찾았습니다!", pageNum: PAGE_NUM });
                    }
                    resetBoard();
                }, 1000); 
            } else {
                setTimeout(() => {
                    firstCard.removeClass('flipped');
                    secondCard.removeClass('flipped');
                    resetBoard();
                }, 800);
            }
        }

        function resetBoard() {
            firstCard = null; secondCard = null; lockGrid = false;
        }
    </script>
</body>
</html>
