<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>북극곰 프로젝트 - 문제 3</title>
    
    <link rel="stylesheet" href="../lib/bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../lib/Pretendard-1.3.9/web/static/pretendard.css" />
    <link rel="stylesheet" href="../css/common.css">

    <style>
        /* 1. 전체 레이아웃 설정 */
        body, html { 
            margin: 0; padding: 0; 
            height: 100vh; 
            background-color: #f8fafc; 
            font-family: 'Pretendard', sans-serif; 
            overflow: hidden; 
        }

        main {
            /* 헤더와 푸터의 높이를 제외한 나머지 공간 사용 */
            height: calc(100vh - var(--header-height, 60px) - var(--footer-height, 60px));
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            /* [핵심] 상단 정렬로 변경하여 위로 밀착시킴 */
            justify-content: flex-start; 
            padding: 15px 20px; 
            gap: 15px; /* 요소들 사이의 자연스러운 간격 */
            box-sizing: border-box;
        }

        /* 2. 지시문 영역 슬림화 */
        .instruction {
            width: 100%;
            max-width: 320px;
            font-size: 1rem; 
            font-weight: 800; 
            color: #334155; 
            text-align: center;
            line-height: 1.4;
            word-break: keep-all;
            margin-top: 5px; /* 헤더와의 간격 최소화 */
        }

        /* 3. 잠금해제 카드 (크기 및 여백 최적화) */
        .login-card {
            background: #ffffff;
            border-radius: 24px; 
            padding: 20px; 
            width: 100%; 
            max-width: 320px; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            box-sizing: border-box;
            border: 1px solid #e2e8f0;
        }

        .login-status { 
            color: #1e293b; 
            font-weight: 800; 
            font-size: 1.2rem; 
            margin-top: 0;
            margin-bottom: 15px; 
        }

        /* 4. PIN 입력 도트 */
        .pin-dots {
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            margin-bottom: 20px;
        }
        .dot {
            width: 12px; height: 12px; 
            border-radius: 50%;
            background: #e2e8f0; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dot.active { 
            background: #3b82f6; 
            transform: scale(1.2); 
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); 
        }

        /* 5. 키패드 레이아웃 (높이 슬림화) */
        .key-grid {
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            width: 100%;
        }
        .key-btn {
            height: 48px; /* 버튼 높이를 줄여서 전체 카드 높이 축소 */
            background: #ffffff; 
            color: #334155;
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
            font-size: 1.2rem; 
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .key-btn:active { 
            background: #f8fafc; 
            transform: scale(0.96); 
            border-color: #3b82f6; 
            color: #3b82f6; 
        }
        
        .key-btn.fn-clear { color: #f87171; font-size: 0.9rem; }
        .key-btn.fn-ok { 
            background: #3b82f6; 
            color: white; 
            border: none; 
            font-size: 0.9rem; 
            font-weight: 800; 
        }
        .key-btn.fn-ok:active { background: #2563eb; }

    </style>
</head>
<body>

    <header id="common-header"></header>

    <main>
        <div class="instruction">
            컴퓨터가 잠겨 있습니다. 북극곰의 비밀을 확인하려면 비밀번호를 입력하세요.
        </div>

        <div class="login-card">
            <h2 class="login-status">컴퓨터 잠금해제</h2>

            <div class="pin-dots">
                <div class="dot" id="dot-0"></div>
                <div class="dot" id="dot-1"></div>
                <div class="dot" id="dot-2"></div>
                <div class="dot" id="dot-3"></div>
            </div>

            <div class="key-grid">
                <button class="key-btn" onclick="pressKey('1')">1</button>
                <button class="key-btn" onclick="pressKey('2')">2</button>
                <button class="key-btn" onclick="pressKey('3')">3</button>
                <button class="key-btn" onclick="pressKey('4')">4</button>
                <button class="key-btn" onclick="pressKey('5')">5</button>
                <button class="key-btn" onclick="pressKey('6')">6</button>
                <button class="key-btn" onclick="pressKey('7')">7</button>
                <button class="key-btn" onclick="pressKey('8')">8</button>
                <button class="key-btn" onclick="pressKey('9')">9</button>
                <button class="key-btn fn-clear" onclick="pressKey('C')">취소</button>
                <button class="key-btn" onclick="pressKey('0')">0</button>
                <button class="key-btn fn-ok" onclick="validate()">확인</button>
            </div>
        </div>
    </main>

    <footer id="common-footer"></footer>

    <script src="../lib/jquery-3.6.0.min.js"></script>
    <script src="../js/common.js"></script>

    <script>
        const PAGE_NUM = 3;
        const CORRECT_PW = "1223"; // 힌트와 일치하도록 설정
        let currentInput = "";

        window.hints = [
            "도서관 벽에 붙어 있는 '도서관 이용 규칙' 종이를 찾아보세요!",
            "이용 규칙 글자들 중에서 굵은 글자들을 순서대로 읽어보세요.",
            "비밀번호는 일이이삼"
        ];

        $(document).ready(function() {
            initializeUI(PAGE_NUM);
        });

        function pressKey(key) {
            if (key === 'C') {
                currentInput = "";
            } else if (currentInput.length < 4) {
                currentInput += key;
            }
            updateDots();
        }

        function updateDots() {
            $('.dot').removeClass('active');
            for (let i = 0; i < currentInput.length; i++) {
                $(`#dot-${i}`).addClass('active');
            }
        }

        function validate() {
            if (currentInput.length < 4) {
                alert("비밀번호 4자리를 입력해주세요.");
                return;
            }

            const isCorrect = (currentInput === CORRECT_PW);

            showResultModal({
                success: isCorrect,
                message: isCorrect ? '🔓 잠금이 해제되었습니다! 검색 페이지로 이동합니다.' : '❌ 비밀번호가 틀렸습니다. 다시 확인해보세요.',
                onRetry: () => { 
                    currentInput = "";
                    updateDots();
                },
                pageNum: 3
            });
        }
    </script>
</body>
</html>
